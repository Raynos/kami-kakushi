    <!-- FB-257 — the stylesheet is LINKED, not `import`ed from JS. A CSS import is a bundler
         convention, not JavaScript: it earns its keep when you have many component sheets to
         split and tree-shake per chunk. We have exactly one global sheet, so it bought nothing —
         and it cost us the dev reload bug, because vite's DEV transform turns a JS-imported
         stylesheet into a JS module that pulls in `@vite/client` (and its `location.reload()`).
         A plain link is standard HTML, still hashed + minified by `vite build`, served as plain
         CSS in dev, and it paints styled on the first frame instead of after main.ts runs. -->
