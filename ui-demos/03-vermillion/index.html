<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Kamikakushi — 03 · Vermillion</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="hdr"></header>
    <nav id="rail" aria-label="Game sections"></nav>
    <main id="main"></main>
    <!-- mobile-only: the record ticker (hidden in base CSS, revealed ≤920px) -->
    <div id="ticker"></div>
    <aside id="log">
      <div id="log-top"></div>
      <div id="log-filters"></div>
      <div id="log-feed"></div>
    </aside>
  </div>

  <!-- full-screen moments -->
  <div id="cold"></div>
  <div id="vn"></div>
  <div id="ceremony"></div>
  <div id="flash"></div>

  <!-- demo stage selector -->
  <div id="strip"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
