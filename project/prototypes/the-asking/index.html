<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>問 The Asking II — ask freely, clues ink in</title>
<style>
  :root {
    --void:#070810; --steel-0:#0e1016; --steel-1:#161922; --steel-2:#1b1f29;
    --steel-hi:#20242f;
    --ink:#c2c8d8; --ink-soft:#8a90a4; --ink-faint:#5c6274;
    --silver:#cdd6ee; --silver-hi:#e7ecff; --silver-dim:#99a2bf;
    --silver-wire:rgba(205,214,238,.55); --silver-faint:rgba(205,214,238,.14);
    --gold:#d8b978; --gold-hi:#f2dca0; --gold-dim:#93794a;
    --key:rgba(216,185,120,.42); --key-dim:rgba(216,185,120,.15);
    --shu:#bf3b25;
    --v-narrator:#9aa4c4; --v-player:#e3ecff; --v-physician:#8fbfc4;
    --v-steward:#c9975c; --v-villager:#a9c391;
    --serif:"Iowan Old Style","Palatino Nova",Palatino,Georgia,serif;
    --chrome:"Avenir Next","Avenir",system-ui,sans-serif;
    --radius:3px;
  }
  html { background:var(--void); }
  body { margin:0; color:var(--ink); font-family:var(--serif); font-size:15px;
    line-height:1.55; min-height:100vh;
    background:radial-gradient(1200px 480px at 50% -140px, #12141d 0%, var(--void) 68%);
    background-attachment:fixed; }
  .shell { max-width:1180px; margin:0 auto; padding:18px 16px 40px;
    border-left:1px solid var(--key-dim); border-right:1px solid var(--key-dim);
    min-height:100vh; box-sizing:border-box; display:flex; flex-direction:column; gap:12px; }
  .plate { background:linear-gradient(180deg,var(--steel-2),var(--steel-1));
    border:1px solid var(--key); border-radius:var(--radius);
    box-shadow:inset 0 1px 0 var(--silver-wire), 0 6px 18px rgba(0,0,0,.35); }
  .label { font-family:var(--chrome); font-size:10.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--silver-dim); }
  button { font:inherit; }
  .plate-btn { background:linear-gradient(180deg,var(--steel-2),var(--steel-1));
    border:1px solid var(--silver-faint); border-top-color:var(--silver-wire);
    border-radius:var(--radius); color:var(--ink); padding:4px 12px; cursor:pointer;
    font-family:var(--serif); font-size:13.5px; }
  .plate-btn:hover { background:linear-gradient(180deg,var(--steel-hi),var(--steel-2));
    color:var(--silver-hi); border-color:var(--silver-wire); }
  .plate-btn:focus-visible { outline:2px solid var(--gold); outline-offset:1px; }

  header.hd { display:flex; align-items:baseline; gap:16px; flex-wrap:wrap; padding:10px 14px; }
  .hd h1 { font-size:18px; font-weight:600; color:var(--silver); margin:0; }
  .hd h1 .kanji { color:var(--gold); margin-right:8px; }
  .hd .sub { color:var(--ink-soft); font-size:12px; font-style:italic; }
  .hd .day { margin-left:auto; color:var(--silver); font-size:13.5px;
    font-variant-numeric:tabular-nums; }
  .hd .day b { color:var(--gold-hi); }

  .cols { display:grid; grid-template-columns: 1fr 340px; gap:12px; flex:1; min-height:0; }
  @media (max-width:900px) { .cols { grid-template-columns:1fr; } }

  .people { display:flex; gap:8px; flex-wrap:wrap; padding:9px 14px; align-items:center; }
  .p-btn { display:flex; flex-direction:column; align-items:flex-start; gap:1px;
    background:linear-gradient(180deg,var(--steel-2),var(--steel-1));
    border:1px solid var(--silver-faint); border-radius:var(--radius);
    padding:6px 14px; cursor:pointer; min-width:112px; text-align:left; }
  .p-btn .nm { font-size:14.5px; }
  .p-btn .role { font-size:10.5px; color:var(--ink-faint); font-family:var(--chrome);
    letter-spacing:.08em; text-transform:uppercase; }
  .p-btn.on { border-color:currentColor; box-shadow:inset 0 0 0 1px var(--key-dim); }
  .p-btn:focus-visible { outline:2px solid var(--gold); outline-offset:1px; }
  .p-btn .gone { font-size:10.5px; color:var(--ink-faint); font-style:italic; }

  .talk { display:flex; flex-direction:column; min-height:430px; }
  .talk-hd { padding:9px 14px; border-bottom:1px solid var(--silver-faint);
    display:flex; gap:12px; align-items:baseline; }
  .talk-hd .where { color:var(--ink-soft); font-size:12.5px; font-style:italic; }
  .lines { flex:1; overflow-y:auto; padding:14px 20px; max-height:52vh; }
  .ln { max-width:64ch; margin:0 0 10px; }
  .ln.you { color:var(--v-player); }
  .ln.you::before { content:"問 — "; color:var(--gold-dim); }
  .ln .who { font-weight:600; }
  .ln.stage { color:var(--v-narrator); font-style:italic; font-size:13.5px; }
  .ln.clue { color:var(--gold-hi); font-size:13.5px; border-left:2px solid var(--gold);
    padding-left:10px; }
  .ln.clue .cl-label { font-family:var(--chrome); font-size:9.5px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--gold-dim); display:block; }
  .ink-in { animation:inkin .4s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes inkin { from { opacity:0; transform:translateY(6px); } }
  @media (prefers-reduced-motion: reduce) { .ink-in { animation:none; } }

  .askrow { display:flex; gap:10px; padding:12px 14px; border-top:1px solid var(--silver-faint);
    align-items:center; }
  .askrow .pre { color:var(--gold); font-size:16px; }
  .askrow input { flex:1; background:transparent; border:none;
    border-bottom:1px solid var(--silver-faint); color:var(--silver-hi);
    font-family:var(--serif); font-size:15.5px; padding:6px 2px; }
  .askrow input:focus { outline:none; border-bottom-color:var(--gold); }
  .askrow input::placeholder { color:var(--ink-faint); font-style:italic; }

  /* the book — always visible, the kikigaki "book" idiom */
  .book { display:flex; flex-direction:column; min-height:0; }
  .book-hd { padding:9px 14px; border-bottom:1px solid var(--silver-faint);
    display:flex; align-items:baseline; gap:10px; }
  .book-hd .t { color:var(--silver); font-weight:600; font-size:14.5px; }
  .book-hd .t .kanji { color:var(--gold); }
  .book-body { overflow-y:auto; padding:10px 14px 16px; }
  .thread { margin-bottom:14px; }
  .thread .q-title { font-size:14.5px; color:var(--silver-hi); font-weight:600;
    text-wrap:balance; }
  .thread .q-state { font-size:11px; color:var(--ink-faint);
    font-family:var(--chrome); letter-spacing:.1em; text-transform:uppercase; }
  .thread .q-state.done { color:var(--gold-dim); }
  .thread ul { list-style:none; margin:6px 0 0; padding:0; }
  .thread li { font-size:13px; color:var(--ink); margin:5px 0; padding-left:12px;
    position:relative; max-width:40ch; }
  .thread li::before { content:"・"; position:absolute; left:0; color:var(--gold-dim); }
  .thread li.resolution { color:var(--gold-hi); }
  .thread li .src { color:var(--ink-faint); font-size:11px; display:block; }
  .book .empty { color:var(--ink-faint); font-style:italic; font-size:13px; }

  ::-webkit-scrollbar { width:6px; } ::-webkit-scrollbar-thumb { background:var(--steel-hi); }
  ::-webkit-scrollbar-track { background:var(--steel-0); }

  .dev { position:fixed; right:10px; bottom:10px; display:flex; gap:6px; align-items:center;
    font-family:var(--chrome); font-size:10px; letter-spacing:.08em; color:var(--ink-faint); z-index:5; }
  .dev button { background:var(--steel-0); border:1px solid var(--silver-faint);
    border-radius:var(--radius); color:var(--ink-soft); font-size:10px; padding:2px 8px;
    cursor:pointer; font-family:var(--chrome); letter-spacing:.08em; }
  footer.colo { text-align:center; color:var(--ink-faint); font-size:11px;
    font-family:var(--chrome); letter-spacing:.06em; }
</style>
</head>
<body>
<div class="shell">
  <header class="hd plate">
    <h1><span class="kanji">問</span>The Asking II</h1>
    <span class="sub">ask in your own words — real answers distill into CLUES in the book (MOCK)</span>
    <span class="day">Day <b id="v-day">1</b> · autumn · clues <b id="v-clues">0</b></span>
  </header>

  <nav class="people plate" id="people" aria-label="Who you are with"></nav>

  <div class="cols">
    <section class="talk plate">
      <div class="talk-hd">
        <span class="label">With</span><span id="with-name">—</span>
        <span class="where" id="where">—</span>
      </div>
      <div class="lines" id="lines" aria-live="polite"></div>
      <form class="askrow" id="askform">
        <span class="pre" aria-hidden="true">問</span>
        <input id="q" autocomplete="off" spellcheck="false"
          placeholder="ask anything — about that night, the book, dates, wages, this house…" aria-label="Your question">
        <button class="plate-btn" type="submit">ask</button>
      </form>
    </section>

    <aside class="book plate" aria-label="The book — open questions and clues">
      <div class="book-hd"><span class="t"><span class="kanji">聞書</span> · open questions</span></div>
      <div class="book-body" id="bookbody"></div>
    </aside>
  </div>

  <footer class="colo">MOCK — feel-test III (Asking + clue-book synthesis) · a ~40-intent miniature of the compiled lexicon · nothing is canon</footer>
</div>

<div class="dev">
  <span>MOCK · not canon</span>
  <button id="dev-day">sleep → next day</button>
  <button id="dev-map">reveal the map (spoilers)</button>
  <button id="dev-reset">reset</button>
</div>

<script>
'use strict';
/* ── people ── */
const PEOPLE = {
  soan:    { name:'Sōan',    role:'physician',   v:'var(--v-physician)',
             where:'His room smells of dried things. He does not stop working while you speak.' },
  matsuzo: { name:'Matsuzō', role:'weir-keeper', v:'var(--v-villager)',
             where:'The weir. He watches the water the whole time, never you.' },
  oyae:    { name:'O-Yae',   role:'scullery girl', v:'var(--v-villager)',
             where:'The gate. She is glad of any excuse to stop hauling water.' },
  toku:    { name:'Toku',    role:'the dowager', v:'var(--v-steward)',
             where:'The hall. She receives your questions like callers: one at a time, properly.' },
};
const ASKS_PER_DAY = 8;

/* ── threads + facts: the clue layer. A thread OPENS when its first fact
      inks in; titles are QUESTIONS (direction), never methods. ── */
const THREADS = {
  't-night':  { title:'What happened at the weir, the night I came?' },
  't-book':   { title:'What does Sōan keep in the grey book?' },
  't-dates':  { title:'When did I actually arrive?' },
  't-light':  { title:'What crosses water against the current?', hidden:true },
  't-purse':  { title:'Who pays for what the house forgets?' },
};
const FACTS = {
  'f-seed':    { th:'t-night', src:'Sōan, the first day',
                 clue:'Sōan only “received what the water was finished with.” The weir-keeper was there. Start with him.' },
  'f-account': { th:'t-night', src:'Matsuzō, at the weir',
                 clue:'No boat. No flood. I was face down at the weir gate at dawn. He told no one.' },
  'f-dry':     { th:'t-night', src:'noted by both',
                 clue:'Dry above the waist — “which the river does not do.”' },
  'f-light':   { th:'t-night', src:'Matsuzō, reluctantly',
                 clue:'A single light crossed the water UPSTREAM, walking pace. Then I was there.', opens:'t-light' },
  'f-writes':  { th:'t-book', src:'the house, variously',
                 clue:'He writes more than a physician needs to. The light in his room burns late.' },
  'f-burned':  { th:'t-book', src:'O-Yae, at the gate',
                 clue:'The morning after I first woke, Sōan burned a page at his own brazier. Nobody burns a blank one.' },
  'f-tenth':   { th:'t-book', src:'Sōan, cornered',
                 clue:'The burned page was written on the TENTH. “A physician corrects the record.”' },
  'f-expected':{ th:'t-book', src:'Sōan, plainly', resolution:true,
                 clue:'A letter came four days before the weir. He was told to be ready. I was not found — I was EXPECTED.' },
  'f-date14':  { th:'t-dates', src:'Toku, dated',
                 clue:'Toku: I arrived the FOURTEENTH of the eighth month. She dates everything.' },
  'f-bon':     { th:'t-dates', src:'Matsuzō’s count',
                 clue:'Bon lanterns went out on the THIRTEENTH. I came out of the weir the morning after the last of them.' },
  'f-word':    { th:'t-light', src:'Toku, once only',
                 clue:'Her grandmother had a word for a light that walks the water. “We do not use it in this house.”' },
  'f-tokupays':{ th:'t-purse', src:'O-Yae, whispered',
                 clue:'The dowager pays O-Yae in old coin, counted twice — “for what the house forgets.”' },
  'f-admits':  { th:'t-purse', src:'Toku, unashamed', resolution:true,
                 clue:'Two years of wages from her widow’s portion, since the trade failed. “A house is people fed, not beams standing.”' },
  'f-trade':   { th:'t-purse', src:'Toku, dated',
                 clue:'The trade failed two autumns ago; the steward ruled off the wage column that same season.' },
};

/* ── concepts ── */
const SYN = {
  night:'night', evening:'night', dark:'night', midnight:'night',
  weir:'weir', river:'weir', water:'weir', sluice:'weir', drown:'weir', drowned:'weir',
  arrive:'arrival', arrived:'arrival', came:'arrival', come:'arrival', found:'arrival',
  pulled:'arrival', rescued:'arrival', washed:'arrival', woke:'arrival', awoke:'arrival',
  happened:'arrival',
  memory:'memory', memories:'memory', remember:'memory', forget:'memory', forgot:'memory',
  past:'memory', amnesia:'memory',
  book:'book', ledger:'book', journal:'book', notebook:'book', write:'book', writes:'book',
  writing:'book', wrote:'book', notes:'book', entry:'book', entries:'book', page:'book',
  pages:'book', grey:'book', gray:'book', record:'book', records:'book', keep:'book', keeps:'book',
  burn:'burn', burned:'burn', burnt:'burn', burning:'burn', brazier:'burn', ash:'burn',
  smoke:'burn', fire:'burn',
  day:'date', date:'date', dates:'date', when:'date', calendar:'date', month:'date',
  tenth:'tenth', '10th':'tenth',
  fourteenth:'fourteenth', '14th':'fourteenth', thirteenth:'fourteenth', '13th':'fourteenth',
  dry:'dry', wet:'dry', soaked:'dry', clothes:'dry', clothing:'dry', waist:'dry',
  light:'light', lights:'light', glow:'light', lantern:'light', lanterns:'light',
  upstream:'upstream', current:'upstream', against:'upstream', crossed:'upstream', crosses:'upstream',
  coin:'coin', coins:'coin', wage:'coin', wages:'coin', paid:'coin', pay:'coin', pays:'coin',
  money:'coin', mon:'coin', purse:'coin',
  toku:'toku', dowager:'toku', lady:'toku', widow:'toku', grandmother:'toku',
  soan:'soan', physician:'soan', doctor:'soan', healer:'soan',
  matsuzo:'matsuzo', keeper:'matsuzo',
  oyae:'oyae', 'o-yae':'oyae', scullery:'oyae', girl:'oyae',
  genemon:'others', steward:'others', kihei:'others', chiyo:'others', yohei:'yohei', pedlar:'yohei',
  house:'house', kurosawa:'house', estate:'house', family:'house', trade:'house',
  you:'you', your:'you', yourself:'you',
  i:'me', me:'me', my:'me', myself:'me', who:'who', am:'me',
  west:'west', path:'west', road:'west',
  bon:'bon', festival:'bon',
  jizo:'jizo', statue:'jizo', offerings:'jizo', flowers:'jizo',
  secret:'secret', secrets:'secret', hide:'secret', hiding:'secret', truth:'secret', lie:'secret',
  afraid:'fear', fear:'fear', scared:'fear',
  work:'work', job:'work', duty:'work', craft:'work', years:'work', long:'work', old:'work',
  weather:'small', rain:'small', harvest:'small', season:'small', cold:'small', autumn:'small',
  count:'tally', counting:'tally', tally:'tally', watch:'tally', watching:'tally', herons:'tally',
  sake:'sake', drink:'sake', jar:'sake',
  see:'see', saw:'see', seen:'see',
  before:'before', earlier:'before', first:'before', begin:'before', begins:'before', early:'before',
  why:'why', word:'word', name:'word', called:'word',
};
const norm = q => q.toLowerCase().replace(/[^a-z0-9\s-]/g,' ').split(/\s+/).filter(Boolean);
const tagsOf = q => new Set(norm(q).map(t => SYN[t]).filter(Boolean));

/* ── state ── */
let S;
function fresh() {
  const s = {
    day:1, asks:{ soan:0, matsuzo:0, oyae:0, toku:0 },
    regard:{ soan:1, matsuzo:0, oyae:1, toku:0 },
    known:[], order:[], asked:new Set(), fallbackN:{ soan:0, matsuzo:0, oyae:0, toku:0 },
    who:'matsuzo', log:{ soan:[], matsuzo:[], oyae:[], toku:[] }, pendingClues:[],
  };
  return s;
}
const known = id => S.known.includes(id);
const R = who => S.regard[who] || 0;
const bump = (who,n=1) => { S.regard[who] = Math.min(3, R(who)+n); };
function latch(id) {
  if (known(id)) return;
  S.known.push(id); S.order.push(id); S.pendingClues.push(id);
  const f = FACTS[id];
  if (f.opens) THREADS[f.opens].hidden = false;
}

/* ── the lexicon ── */
const INTENTS = [
  { id:'night-weir', slots:['night|arrival|see','weir'],
    re: {
      matsuzo: () => {
        if (R('matsuzo') >= 1) { latch('f-account'); latch('f-dry');
          return '“There was no boat and no flood.” He says it to the water, not to you. “You were face down at the gate of my weir at dawn. Dry above the waist — which the river does not do. I told no one. Who does a man tell that to?” He pauses. “Ask me what I SAW, if you want the part I don’t say.”'; }
        return '“Not on an empty jar.” He taps the rail twice. It is not a no; it is a price. (He talks to people who talk to HIM.)';
      },
      soan: () => { latch('f-seed');
        return '“I received what the water was finished with. What the water did first is the weir-keeper’s to tell — he was there. I was sent for.” The words SENT FOR arrive a half-beat late, like a coin he regrets spending.'; },
      oyae: '“They say the old weir-keeper found you half-drowned and carried you up himself. He’s stronger than he looks, they say.” She loves “they say” like a season.',
      toku: () => { latch('f-date14');
        return '“The fourteenth of the eighth month.” No hesitation. “I date what happens to this house. You happened to it.”'; },
    } },
  { id:'what-saw', slots:['see|light','weir|night|upstream'],
    re: {
      matsuzo: () => {
        if (known('f-account')) { latch('f-light');
          return 'He is quiet a long time. “A light. ONE light, crossing UPSTREAM — against the current, steady, the pace of a man walking a corridor. A lantern doubles in the river. This one didn’t.” He looks at you once. “Then it was gone, and there you were.”'; }
        return '“Saw?” He goes back to the water. “First tell me you know what happened. Then ask me what I saw.”';
      },
      soan: '“Marsh-gas does strange things in the eighth month. So do tired eyes.” Too smooth. A prescription he has filled before.',
      toku: () => {
        if (known('f-light')) { latch('f-word');
          return 'She is still so long you think she has not heard. “My grandmother had a word for a light that walks the water.” She smooths her sleeve once. “We do not use it in this house. Ask me anything else.”'; }
        return '“Fireflies are done for the year. Speak plainly or of something else.”';
      },
      oyae: '“Like the Bon lanterns? They go west down to the water every year. Beautiful and sad. Why do you ask like THAT?”',
    } },
  { id:'arrival-date', slots:['arrival|me|night','date|fourteenth'],
    re: {
      toku: () => { latch('f-date14'); return '“The fourteenth. I have said so. I will say it the same way in ten years.”'; },
      matsuzo: () => { latch('f-bon'); return '“Morning after the Bon lanterns went out — and they go out on the THIRTEENTH, same every year. I keep the count.” He lets you do the arithmetic yourself.'; },
      soan: '“The fourteenth, as anyone will tell you.” He becomes very interested in a jar he has already arranged.',
      oyae: '“The lantern month, before my time noticing you. The dowager keeps every date in the province — ask HER.”',
    } },
  { id:'bon', slots:['bon'],
    re: {
      matsuzo: () => { latch('f-bon'); return '“Lanterns out on the thirteenth. You came out of my weir the morning after the last of them. Some things you can set the water by.”'; },
      oyae: '“Bon! The dead come home and eat better than we do.” She laughs, then doesn’t. “Then the lanterns lead them BACK to the water. That’s the part I never liked. Watching them go.”',
      toku: '“We keep Bon properly. The dead are family, and family is not optional.”',
      soan: '“A physician works Bon. The living get ill out of sheer feeling.”',
    } },
  { id:'soan-writing', slots:['book'],
    re: {
      soan: () => {
        if (known('f-burned')) { latch('f-tenth');
          return 'He goes very still. “The girl talks.” A breath. “A page I wrote on the TENTH. It was premature. A physician corrects the record — that is ALL a physician does.” His hands, you notice, have stopped.'; }
        return '“Notes. A physician who does not write buries his mistakes twice.” The brush keeps moving. He has not said what the notes are OF.';
      },
      oyae: () => { latch('f-burned'); latch('f-writes');
        return 'She sets the bucket down. “The morning after you first woke — he BURNED a page. At his own brazier. I saw the smoke. Paper is dear, sir; nobody burns a blank one.” Then, quickly: “Don’t say I said.”'; },
      toku: () => { latch('f-writes');
        return '“A physician’s book outlives his patients. Ask him what he keeps — and watch his hands when he answers, not his mouth.”'; },
      matsuzo: () => { latch('f-writes');
        return '“Can’t read.” A pause. “He can. Writes more than he doctors, some nights — the light burns late in that room.”'; },
    } },
  { id:'burned-page', slots:['burn'],
    re: {
      soan: () => {
        if (known('f-burned')) { latch('f-tenth');
          return '“The girl talks.” He sets the brush down with terrible care. “A page written on the TENTH. Premature. A physician corrects the record.” He offers nothing else, and the offering of nothing is loud.'; }
        return '“Ash is ash. If you have a wound, show me the wound.”';
      },
      oyae: () => { latch('f-burned'); return '“So you HEARD!” — delighted — “the page, the brazier, the morning after you woke. I saw the smoke myself. Don’t say I said.”'; },
      toku: '“In this house we burn pine and we burn our dead. Whoever burns paper has a reason worth the paper.”',
      matsuzo: '“Men burn what they can’t drown.” He seems to find this fair.',
    } },
  { id:'why-before', slots:['tenth','date|fourteenth|before|arrival|me|why'],
    re: {
      soan: () => {
        if (known('f-tenth') && (known('f-date14') || known('f-bon'))) { latch('f-expected');
          return 'For the first time he looks at you the way he looks at a fever chart. “Because I was told to be ready.” The room is very quiet. “Four days before the weir, a letter came. I burned my first note because it named the letter. You were not found, boy. You were EXPECTED.” He opens the door for you to leave, courteously, like a man who has handed you something heavy.'; }
        if (known('f-tenth')) return '“Dates.” One-shoulder shrug. “Ask the dowager; she hoards them.” (You have his tenth. Whose fourteenth do you trust?)';
        return '“You are counting on your fingers with no numbers. Come back when you have numbers.”';
      },
      toku: '“Before? Nothing about you is BEFORE. You began on the fourteenth, as far as this house is concerned.” The AS-FAR-AS sits there, dated and deliberate.',
      oyae: '“Numbers, sir? I carry water.”',
      matsuzo: '“Count on your own fingers. I count herons.”',
    } },
  { id:'dry', slots:['dry'],
    re: {
      soan: () => { latch('f-dry'); return '“You were dry above the waist when they brought you in. I noted it.” A beat. “I note things.”'; },
      matsuzo: () => { latch('f-dry'); return '“Dry.” A verdict. “Which the river does not do.”'; },
      oyae: '“I washed what you came in. River-mud to the belt, clean as church above. I didn’t love touching it, if you want the truth.”',
      toku: '“I do not discuss gentlemen’s laundry.” Almost a joke. Almost.',
    } },
  { id:'wages', slots:['coin'],
    re: {
      oyae: () => {
        if (R('oyae') >= 1) { latch('f-tokupays');
          return 'One glance at the yard. “The lady dowager pays me. Old coin, worn smooth, counted twice.” Quieter: “She pays for what the house forgets.” Then, loudly: “LOVELY weather for hauling!”'; }
        return '“Wages, sir?” The bucket is suddenly fascinating.';
      },
      toku: () => {
        if (known('f-tokupays')) { latch('f-admits'); latch('f-trade');
          return '“Two years.” She folds her hands. “Since the autumn the trade failed and the steward ruled off the wage column like a man closing an eye. My widow’s portion is mine to spend. A house is people fed, not beams standing.” She regards you. “Write that down, since you write things down.”'; }
        return '“The house’s books are the steward’s. My purse is mine. Which are you asking an old woman about?” — and she waits, genuinely, for you to dare.';
      },
      soan: '“I am paid in radishes as often as coin. Ask the steward about money; bring me the radishes.”',
      matsuzo: '“I pay THEM. Weir lease, first of the month.” The phrase “to the young master by subtraction” sounds rehearsed and bitter.',
    } },
  { id:'house-decline', slots:['house','coin|secret|small|why'],
    re: {
      toku: () => { latch('f-trade');
        return '“The trade failed two autumns ago — I will give you the day if you want it; nobody else here will. A house does not fall in a night. It rounds DOWN, year by year, until someone counts honestly.”'; },
      soan: '“The house pays me late and apologizes early. Draw your own chart.”',
      oyae: '“We do more with less every year. The dowager says a house is people fed—” she stops, having quoted somebody she shouldn’t.',
      matsuzo: '“Lease used to renew every three years. Now it’s yearly. Up at the house that means something; down here it means paper.”',
    } },
  /* person-directed — these raise hidden regard */
  { id:'about-you', slots:['you','work|tally|memory|house|small|who|weir'],
    re: {
      matsuzo: () => { bump('matsuzo');
        return '“Forty-one years at this weir. Two floods, one drowning, one—” he stops. “Two floods and one drowning.” He almost smiles at your noticing. “You listen. Most don’t.” (He is easier with you now.)'; },
      soan: () => { bump('soan');
        return '“I trained in the castle town. It was full of physicians and empty of patients who told the truth. Country people lie less.” He looks at you. “Present company under review.”'; },
      oyae: () => { bump('oyae');
        return '“Me? Nobody asks about ME.” Her mother, the walk from the village, the cook’s temper and one very good festival, all in one breath. You are now her favorite person on the estate.'; },
      toku: () => { bump('toku');
        return '“I came to this house in my sixteenth year, the year the second granary was raised. Everything I tell you will have a date on it. Dates are how a woman is believed.”'; },
    } },
  { id:'tally', slots:['tally'],
    re: {
      matsuzo: () => { bump('matsuzo');
        return '“Herons. Boats. Water-height by the third post.” A pause. “You, since the fourteenth. Nothing personal — I count what the weir sends me.”'; },
      soan: '“I count doses. Miscounting is how physicians become famous.”',
      oyae: '“Buckets. Today: thirty-one. It is not interesting, sir.”',
      toku: '“Years. We are none of us short of material.”',
    } },
  { id:'small-talk', slots:['small'],
    re: {
      matsuzo: () => { bump('matsuzo'); return '“Water’s low for the month.” From him, this is nearly friendship.'; },
      soan: () => { bump('soan'); return '“The cold comes early. Old joints know first; I dose half the village in the eighth month.”'; },
      oyae: () => { bump('oyae'); return '“They say the harvest dance might be BIG this year—” and you receive the village’s entire social calendar, with commentary.'; },
      toku: () => { bump('toku'); return '“The autumn of the year you came is ending. Seasons close, sir. Books should.”'; },
    } },
  { id:'west-path', slots:['west'],
    re: {
      oyae: '“The Bon road — the lanterns go down it to the water every year. Nobody walks it after dark otherwise. Well. Nobody SHOULD.”',
      toku: '“The lantern road. My grandmother kept the rite the old way — further than the bank. The house keeps it to the bank.” No date accompanies this. You notice.',
      matsuzo: '“Comes out at my weir. Bon nights the whole river is paper and light. Pretty, if you don’t think about it.”',
      soan: '“A path. It goes west.” He is not going to be interesting about this, visibly on purpose.',
    } },
  { id:'who-am-i', slots:['me|who','memory|word'],
    re: {
      soan: '“You ask as if I would know more than you.” Evenly. Too evenly, you think later. “Rest. Names return or they do not.”',
      toku: '“You are the man from the weir, and since the fourteenth the house’s to feed. That is AN answer. It is not THE answer, but it is the one I have.”',
      matsuzo: '“You’re what the weir gave me instead of a heron.” He finds this genuinely funny, once, silently.',
      oyae: '“They say you might be anyone! A lord’s son, a runaway monk, a drowned gh—” she stops. “Not the last one. It’s only what they say.”',
    } },
  { id:'secrets', slots:['secret|fear'],
    re: {
      soan: '“Everyone keeps something. A physician keeps most of it professionally.” The word PROFESSIONALLY is doing a great deal of work.',
      matsuzo: '“Afraid? Of the river, always. A man who isn’t is about to teach the village a lesson at his own expense.”',
      oyae: '“I’d tell you MY secrets but I haven’t any good ones. Other people’s, now—” she catches herself with real effort.',
      toku: '“A house this old is built of kept things. Pull one beam and see what the roof does.” A warning and an invitation at once.',
    } },
  { id:'others', slots:['others'],
    re: {
      oyae: '“The steward counts everything twice; the drill-master’s bark is worse; the young master reads you like a tally and doesn’t like the total. There — saved you a season of asking.”',
      toku: '“The living members of this house you may observe at dinner. The absent ones are not dinner conversation.” ABSENT ones. Plural.',
      soan: '“I treat them all and discuss none of them. You see how that also protects YOU.”',
      matsuzo: '“House folk pass my weir twice a year and look at the water like it owes them rent.”',
    } },
  { id:'jizo', slots:['jizo'],
    re: {
      oyae: '“Fresh flowers at the paddy jizō, always, and I don’t know WHO. It’s the one gossip I don’t have and it drives me mad.”',
      toku: '“Someone honors what the house does not remember to. Some accounts are private. Leave them to it.”',
      matsuzo: '“Before dawn, whoever it is. Not my water, not my count.”',
      soan: '“Stone does not sicken. I have no opinion on the jizō.”',
    } },
  { id:'sake', slots:['sake|yohei'],
    re: {
      matsuzo: '“The pedlar keeps the clear stuff.” He looks at the water, at you, at the water. It is the least subtle thing an old man has ever done.',
      oyae: '“Yohei’s at the gate on market days. Sharp as a hook, wraps things nicely.”',
      soan: '“I buy alum from him and doubt him at every weighing.”',
      toku: '“A pedlar knows a road’s worth of everything. Buy something small and let him talk.”',
    } },
];

const FALLBACK = {
  soan: ['“Hm.” The brush keeps moving. “Ask it smaller.”',
         '“That is either philosophy or gossip, and I stock neither.”',
         '“Ask it the way you would describe a symptom: where, when, how much.”'],
  matsuzo: ['A grunt. The water is more interesting than your question, and he lets you know it.',
            '“Words.” He adjusts a rope that did not need adjusting.',
            '“Ask the house. Or the river. Whichever answers first.”'],
  oyae: ['“Sir, I have no idea what you just asked, and I know EVERYTHING.”',
         '“Is that a riddle? Ask me who’s courting whom instead.”',
         '“You do ask the strangest things. I’ll think on it while I haul.”'],
  toku: ['“Rephrase it, and this time decide what you are actually asking.” Not unkind. A lesson.',
         '“That question has no date in it. Give a thing its WHEN and it becomes answerable.”',
         '“An old woman’s attention is a small purse. Spend it precisely.”'],
};
const LEAK = {
  soan: '“…While you are here: eat before sundown. You came to me weak once already, and I had warning then.” The word WARNING leaves him unnoticed.',
  matsuzo: '“…Fourteen years I’ve kept the Bon count. Lanterns out on the thirteenth, always. Some things you can set the water by.”',
  oyae: '“…Oh! Unrelated: if you ever wonder about the west path, don’t wonder about it after dark. That’s the whole thought.”',
  toku: '“…You may as well know the second granary was raised the year I came. This house could BUILD, once. Remember that when you hear it creak.”',
};

/* ── matching ── */
function match(q, who) {
  const tags = tagsOf(q);
  let best = null, bestScore = 0;
  for (const it of INTENTS) {
    if (!it.slots.every(slot => slot.split('|').some(t => tags.has(t)))) continue;
    const score = it.slots.length + (it.re[who] ? 0.5 : 0);
    if (score > bestScore) { best = it; bestScore = score; }
  }
  return best;
}
function answer(q) {
  const who = S.who;
  if (S.asks[who] >= ASKS_PER_DAY)
    return { stage:true, text: PEOPLE[who].name + ' has given you what a day politely allows. (Sleep, and come back.)' };
  S.asks[who]++;
  const it = match(q, who);
  if (!it) {
    const n = S.fallbackN[who]++;
    return { text: (n > 0 && n % 3 === 2) ? LEAK[who] : FALLBACK[who][n % 3] };
  }
  const key = it.id + ':' + who;
  const again = S.asked.has(key); S.asked.add(key);
  const r = it.re[who];
  if (!r) return { text: who === 'toku'
      ? '“Not mine to speak of. Ask where the knowing lives.”'
      : '“Couldn’t say.” (Perhaps someone else could.)' };
  return { text: typeof r === 'function' ? r() : r, again };
}

/* ── rendering ── */
const $ = s => document.querySelector(s);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
function renderPeople() {
  $('#people').innerHTML = '<span class="label">Before</span>' +
    Object.entries(PEOPLE).map(([id,p]) => {
      const spent = S.asks[id] >= ASKS_PER_DAY;
      return `<button class="p-btn ${id===S.who?'on':''}" data-who="${id}" style="color:${p.v}">
        <span class="nm">${p.name}</span><span class="role">${p.role}</span>
        ${spent ? '<span class="gone">has had enough today</span>' : ''}</button>`;
    }).join('');
  const p = PEOPLE[S.who];
  $('#with-name').textContent = p.name; $('#with-name').style.color = p.v;
  $('#where').textContent = p.where;
  $('#v-day').textContent = S.day;
  $('#v-clues').textContent = S.known.length;
}
function renderLines() {
  const el = $('#lines');
  el.innerHTML = S.log[S.who].map((l,i,arr) => {
    const last = i >= arr.length - 3 ? ' ink-in' : '';
    if (l.q !== undefined) return `<p class="ln you${last}">${esc(l.q)}</p>`;
    if (l.clue) return `<p class="ln clue${last}"><span class="cl-label">the book takes a line</span>${esc(l.clue)}</p>`;
    if (l.stage) return `<p class="ln stage${last}">${esc(l.text)}</p>`;
    return `<p class="ln${last}"><span class="who" style="color:${PEOPLE[S.who].v}">${PEOPLE[S.who].name}:</span> ${esc(l.text)}${l.again ? ' <span style="color:var(--ink-faint);font-size:12px;font-style:italic">(again)</span>' : ''}</p>`;
  }).join('') || `<p class="ln stage">You stand before ${PEOPLE[S.who].name}. Ask what you actually wonder — the book keeps what matters.</p>`;
  el.scrollTop = el.scrollHeight;
}
function renderBook() {
  const openThreads = Object.entries(THREADS).filter(([tid,t]) =>
    !t.hidden && S.order.some(f => FACTS[f].th === tid));
  $('#bookbody').innerHTML = openThreads.length ? openThreads.map(([tid,t]) => {
    const facts = S.order.filter(f => FACTS[f].th === tid);
    const done = facts.some(f => FACTS[f].resolution);
    return `<div class="thread">
      <div class="q-title">${esc(t.title)}</div>
      <div class="q-state ${done?'done':''}">${done ? '✒ answered' : 'open — ' + facts.length + ' clue' + (facts.length===1?'':'s')}</div>
      <ul>${facts.map(f => `<li class="${FACTS[f].resolution?'resolution':''}">${esc(FACTS[f].clue)}<span class="src">${esc(FACTS[f].src)}</span></li>`).join('')}</ul>
    </div>`;
  }).join('') : '<div class="empty">The book is blank. Ask, and it will keep what matters.</div>';
}
function flushClues() {
  for (const id of S.pendingClues) S.log[S.who].push({ clue: FACTS[id].clue });
  S.pendingClues = [];
}
function render() { renderPeople(); renderLines(); renderBook(); }

/* ── wiring ── */
document.addEventListener('click', e => {
  const b = e.target.closest('button'); if (!b) return;
  if (b.dataset.who) { S.who = b.dataset.who; render(); $('#q').focus(); }
});
$('#askform').addEventListener('submit', e => {
  e.preventDefault();
  const q = $('#q').value.trim(); if (!q) return;
  $('#q').value = '';
  const res = answer(q);
  if (res.stage) S.log[S.who].push({ stage:true, text:res.text });
  else { S.log[S.who].push({ q }); S.log[S.who].push({ text:res.text, again:res.again }); flushClues(); }
  render(); $('#q').focus();
});
$('#dev-day').addEventListener('click', () => { S.day++; S.asks = { soan:0, matsuzo:0, oyae:0, toku:0 };
  S.log[S.who].push({ stage:true, text:'Day ' + S.day + '. The house wakes; patience is refilled.' }); render(); });
$('#dev-reset').addEventListener('click', () => { S = fresh(); seed(); render(); });
$('#dev-map').addEventListener('click', () => {
  S.log[S.who].push({ stage:true, text:'[DEV — the map, for judging coverage after play] The book starts with one open question (Sōan’s seed clue points at the weir-keeper). MATSUZŌ: one personal question (his work, his count) is enough — then ask about the night → his account inks in; then ask what he SAW → the light. Take “light” to TOKU → her grandmother’s word. DATES: Toku gives the 14th; Matsuzō’s Bon count gives lanterns-out-the-13th. THE BOOK: ask O-YAE about Sōan’s book → the burned page; press SŌAN about the burning → written the 10th; with the 10th + a date, ask Sōan WHY his record begins before the weir → “You were expected.” WAGES: one friendly question to O-Yae, then ask her about wages → the dowager pays; confront TOKU → her admission. ~20 intents latch clues; the rest is authored texture, deflection, and leaks.' });
  render();
});

function seed() {
  latch('f-seed');
  S.log[S.who].push({ stage:true, text:'The book’s first page carries the one thing you were told while you could barely hear it:' });
  flushClues();
}
S = fresh();
seed();
render();
$('#q').focus();
</script>
</body>
</html>
