<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PROTOTYPE — physical token on the survey sheet (map travel presence)</title>
<style>
  /* Andon Steel tokens — copied from src/ui/styles.css resolved values, 2026-07-11 */
  :root {
    --steel-0: #0e1016; --steel-1: #161922; --steel-2: #1b1f29; --steel-hi: #20242f;
    --void: #070810;
    --ink: #c2c8d8; --ink-soft: #8a90a4; --ink-faint: #5c6274;
    --silver: #cdd6ee; --silver-hi: #e7ecff; --silver-dim: #99a2bf;
    --silver-wire: rgba(205, 214, 238, 0.55); --silver-faint: rgba(205, 214, 238, 0.14);
    --gold: #d8b978; --gold-hi: #f2dca0; --gold-dim: #93794a;
    --shu: #bf3b25; --shu-hi: #de5a3a; --shu-deep: #7e2414;
    --key: rgba(216, 185, 120, 0.42); --key-dim: rgba(216, 185, 120, 0.15);
    --font-head: 'Iowan Old Style', 'Palatino Linotype', Palatino, Georgia, serif;
    --font-kanji: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    --radius: 3px; --dur: 320ms; --ease-ink: cubic-bezier(0.2, 0.7, 0.2, 1);
  }
  * { box-sizing: border-box; margin: 0; }
  html, body { height: 100%; background: var(--void); overflow: hidden; }
  body { font-family: var(--font-head); color: var(--ink); }

  /* ── stage: the sheet + the token overlay share one box, camera transforms it ── */
  #viewport { position: fixed; inset: 0; overflow: hidden; }
  #stage { position: absolute; transform-origin: 0 0; will-change: transform; }
  #stage img, #stage svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #overlay { cursor: crosshair; }

  /* ── control panel ── */
  #panel {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    background: color-mix(in srgb, var(--steel-1) 92%, transparent);
    border: 1px solid var(--key-dim); border-radius: var(--radius);
    padding: 12px 14px; max-width: 300px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  #panel h1 { font-size: 0.82rem; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--gold); font-weight: 600; margin-bottom: 2px; }
  #panel .sub { font-size: 0.72rem; color: var(--ink-faint); margin-bottom: 10px; }
  #panel .row { margin-bottom: 9px; }
  #panel .lab { font-size: 0.66rem; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-soft); margin-bottom: 4px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip {
    font: inherit; font-size: 0.78rem; color: var(--silver-dim);
    background: var(--steel-2); border: 1px solid var(--silver-faint);
    border-radius: var(--radius); padding: 4px 9px; cursor: pointer;
    transition: all var(--dur) var(--ease-ink);
  }
  .chip:hover { color: var(--silver); border-color: var(--silver-wire); }
  .chip.on { color: var(--gold-hi); border-color: var(--key); background: var(--steel-hi); }
  label.tog { display: flex; align-items: center; gap: 7px; font-size: 0.8rem;
    color: var(--silver-dim); cursor: pointer; }
  label.tog input { accent-color: var(--gold-dim); }
  #where { font-size: 0.8rem; color: var(--silver); border-top: 1px solid var(--silver-faint);
    padding-top: 8px; margin-top: 2px; }
  #where b { color: var(--gold-hi); font-weight: 600; }
  #hint { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 0.75rem; color: var(--ink-faint); letter-spacing: 0.06em;
    background: color-mix(in srgb, var(--steel-1) 80%, transparent);
    padding: 4px 12px; border-radius: var(--radius); pointer-events: none; }

  /* zone hover ring */
  .zone-hit { fill: transparent; cursor: pointer; }
  .zone-ring { fill: none; stroke: var(--gold); stroke-width: 2.5; opacity: 0;
    pointer-events: none; transition: opacity 180ms var(--ease-ink); }
  .zone-hit:hover + .zone-ring { opacity: 0.75; }
</style>
</head>
<body>
<div id="viewport">
  <div id="stage">
    <img src="t0-sheet.svg" alt="T0 survey sheet (real render, baked 2026-07-11)" draggable="false" />
    <svg id="overlay" viewBox="430 330 2220 1480" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
</div>

<div id="panel">
  <h1>Physical token — feel test</h1>
  <div class="sub">MOCK · prototype only, nothing here is canon (FB-340 / HR-26 territory)</div>
  <div class="row">
    <div class="lab">Token</div>
    <div class="chips" id="tokenChips"></div>
  </div>
  <div class="row">
    <div class="lab">Movement</div>
    <div class="chips" id="moveChips"></div>
  </div>
  <div class="row">
    <label class="tog"><input type="checkbox" id="followTog" /> camera follows the piece</label>
  </div>
  <div id="where">at: <b id="whereName">Forecourt</b></div>
</div>
<div id="hint">click a zone or open ground to travel · scroll to zoom (stays) · drag to pan</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════════════════════════
// MOCK DATA — T0 zone anchors copied from src/ui/map-sheets/layout.ts
// (2026-07-11). World units; the sheet viewBox is 430 330 2220 1480.
// ══════════════════════════════════════════════════════════════════════════
const ZONES = [
  { id: 'weir', name: 'Weir & riverbank', x: 585, y: 1105 },
  { id: 'weir-reeds', name: 'Weir reeds', x: 610, y: 1372 },
  { id: 'gate', name: 'Gate & gateyard', x: 2140, y: 1568 },
  { id: 'forecourt', name: 'Forecourt', x: 2145, y: 1398 },
  { id: 'woodshed', name: 'Woodshed', x: 1978, y: 1458 },
  { id: 'kitchen', name: 'Kitchen', x: 2028, y: 1288, room: true },
  { id: 'shrine', name: 'Shrine', x: 2130, y: 1178, room: true },
  { id: 'kura', name: 'Kura & grain-store', x: 2310, y: 1030 },
  { id: 'sickroom', name: 'Sickroom', x: 1950, y: 1332, room: true },
  { id: 'drill-yard', name: 'Drill yard', x: 2272, y: 1346 },
  { id: 'paddies', name: 'Home paddy', x: 1670, y: 1668 },
  { id: 'field-margins', name: 'Field margins', x: 1424, y: 1652 },
  { id: 'woodlot', name: 'Woodlot edge', x: 2565, y: 1145 },
  { id: 'ruined', name: 'Ruined compound', x: 1650, y: 820 },
  { id: 'orchard', name: 'Overgrown orchard', x: 1905, y: 1005 },
  { id: 'grove', name: 'Bamboo grove', x: 2095, y: 425 },
  { id: 'night-rounds', name: 'Night rounds', x: 2242, y: 1560 },
];
const VB = { x: 430, y: 330, w: 2220, h: 1480 };
const NS = 'http://www.w3.org/2000/svg';
const sv = (tag, attrs = {}) => {
  const el = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
};

const overlay = document.getElementById('overlay');

// ── defs: soft shadow blur ──────────────────────────────────────────────────
{
  const defs = sv('defs');
  const f = sv('filter', { id: 'soft', x: '-60%', y: '-60%', width: '220%', height: '220%' });
  f.appendChild(sv('feGaussianBlur', { stdDeviation: 3.5 }));
  defs.appendChild(f);
  const f2 = sv('filter', { id: 'softer', x: '-80%', y: '-80%', width: '260%', height: '260%' });
  f2.appendChild(sv('feGaussianBlur', { stdDeviation: 7 }));
  defs.appendChild(f2);
  // wood gradient for the koma
  const lg = sv('linearGradient', { id: 'wood', x1: 0, y1: 0, x2: 0.7, y2: 1 });
  lg.appendChild(sv('stop', { offset: '0%', 'stop-color': '#c9a668' }));
  lg.appendChild(sv('stop', { offset: '45%', 'stop-color': '#a8875a' }));
  lg.appendChild(sv('stop', { offset: '100%', 'stop-color': '#7d6440' }));
  defs.appendChild(lg);
  // fired-clay gradient for the haniwa
  const cg = sv('linearGradient', { id: 'clay', x1: 0, y1: 0, x2: 0.6, y2: 1 });
  cg.appendChild(sv('stop', { offset: '0%', 'stop-color': '#c08258' }));
  cg.appendChild(sv('stop', { offset: '55%', 'stop-color': '#a06544' }));
  cg.appendChild(sv('stop', { offset: '100%', 'stop-color': '#7c4a30' }));
  defs.appendChild(cg);
  overlay.appendChild(defs);
}

// ── layers: footprints under, token above, zone hits on top ────────────────
const trailLayer = sv('g');
const shadowLayer = sv('g');
const tokenLayer = sv('g');
const hitLayer = sv('g');
overlay.appendChild(trailLayer);
overlay.appendChild(shadowLayer);
overlay.appendChild(tokenLayer);
overlay.appendChild(hitLayer);

// click-anywhere travel + zone hits with hover rings
{
  const bg = sv('rect', { x: VB.x, y: VB.y, width: VB.w, height: VB.h, fill: 'transparent' });
  bg.style.cursor = 'crosshair';
  bg.addEventListener('click', (e) => travelToEvent(e));
  hitLayer.appendChild(bg);
  for (const z of ZONES) {
    const r = z.room ? 34 : 48;
    const hit = sv('circle', { cx: z.x, cy: z.y, r, class: 'zone-hit' });
    const ring = sv('circle', { cx: z.x, cy: z.y, r: r - 6, class: 'zone-ring' });
    // land just south of the seal so the little piece stands BESIDE the label,
    // never behind it (the mini is smaller than the seal box)
    hit.addEventListener('click', (e) => { e.stopPropagation(); travelTo(z.x, z.y + 46, z.name); });
    hitLayer.appendChild(hit);
    hitLayer.appendChild(ring);
  }
}

// ══════════════════════════════════════════════════════════════════════════
// The token builds — four miniature sculpts on the shared standee scaffold.
// Each returns { body, shadow, onWalk(t, moving), size }; body is centred on
// (0,0) = the point the piece occupies on the sheet.
// ══════════════════════════════════════════════════════════════════════════

// upright standee scaffold — shadow, base furniture and gait; each sculpt
// supplies its own figure. The four sculpts deliberately diverge in MATERIAL,
// SILHOUETTE, BASE and GAIT (human 2026-07-11: "not the same robe with one
// piece of flare").
function makeStandee(buildFig, opts = {}) {
  // MINI: smaller than the zone-seal labels (~55 world units), but not lost —
  // 0.55 read too small, +50% was the human's middle ground (2026-07-11)
  const MINI = 0.82;
  const shadow = sv('ellipse', { cx: 2, cy: 2.5, rx: 17 * MINI, ry: 7 * MINI, fill: '#000', opacity: 0.5, filter: 'url(#soft)' });
  const body = sv('g');
  const inner = sv('g', { transform: `scale(${MINI})` });
  if (opts.base === 'wood') {
    inner.appendChild(sv('ellipse', { cx: 0, cy: 0, rx: 15, ry: 6.5, fill: '#54432a', stroke: '#2e2417', 'stroke-width': 1.3 }));
    inner.appendChild(sv('ellipse', { cx: 0, cy: -3, rx: 15, ry: 6.5, fill: 'url(#wood)', stroke: '#5c4a2e', 'stroke-width': 1 }));
  } else if (opts.base === 'lacquer') {
    inner.appendChild(sv('ellipse', { cx: 0, cy: 0, rx: 14.5, ry: 6, fill: '#07080d', stroke: '#000', 'stroke-width': 1 }));
    inner.appendChild(sv('ellipse', { cx: 0, cy: -2.5, rx: 14.5, ry: 6, fill: '#14161f', stroke: '#2a2f3d', 'stroke-width': 1 }));
    inner.appendChild(sv('path', { d: 'M -10 -5 A 12 4.5 0 0 1 2 -8', fill: 'none', stroke: '#cdd6ee', 'stroke-width': 1.1, opacity: 0.45 }));
  } else if (opts.base === 'block') {
    inner.appendChild(sv('rect', { x: -13, y: -8, width: 26, height: 8, rx: 1, fill: '#6f5936', stroke: '#3a2d1a', 'stroke-width': 1.2 }));
    inner.appendChild(sv('rect', { x: -13, y: -9.5, width: 26, height: 3, rx: 1, fill: '#93794a', stroke: '#3a2d1a', 'stroke-width': 1 }));
    inner.appendChild(sv('line', { x1: -9, y1: -4, x2: 9, y2: -4, stroke: '#3a2d1a', 'stroke-width': 0.8, opacity: 0.5 }));
  } else {
    // no furniture — the piece stands directly on the paper
    inner.appendChild(sv('ellipse', { cx: 0, cy: -1, rx: 11, ry: 4.5, fill: '#000', opacity: 0.2 }));
  }
  const fig = sv('g');
  buildFig(fig);
  inner.appendChild(fig);
  body.appendChild(inner);
  const gait = opts.gait ||
    ((t) => `translate(0 ${Math.sin(t * 0.02) * 4}) rotate(${Math.sin(t * 0.01) * 4})`);
  return {
    body, shadow, rotates: false, size: 18,
    onWalk(t, moving) { fig.setAttribute('transform', moving ? gait(t) : ''); },
  };
}

function buildMiniPorter() {
  // 根付 — carved boxwood netsuke: a porter leaning into his stride, bundle
  // high on his back, staff planted. Weighty, rounded, all wood.
  return makeStandee((fig) => {
    // staff, planted ahead
    fig.appendChild(sv('line', { x1: 17, y1: -46, x2: 12, y2: -2, stroke: '#5c4a2e', 'stroke-width': 2.6, 'stroke-linecap': 'round' }));
    // stride legs
    fig.appendChild(sv('path', { d: 'M -4 -12 L -9 -2 M 5 -12 L 8 -2', fill: 'none', stroke: '#6f5936', 'stroke-width': 5.5, 'stroke-linecap': 'round' }));
    // torso leaning forward (rightward = the walk)
    fig.appendChild(sv('path', {
      d: 'M -8 -8 C -11 -18, -8 -30, 0 -34 C 7 -37, 12 -33, 12 -27 C 12 -19, 10 -12, 9 -8 C 4 -4, -4 -4, -8 -8 Z',
      fill: 'url(#wood)', stroke: '#3a2d1a', 'stroke-width': 1.6,
    }));
    // the bundle rides high on the back, rope-tied
    fig.appendChild(sv('ellipse', { cx: -8, cy: -38, rx: 10.5, ry: 8.5, transform: 'rotate(-18 -8 -38)', fill: '#a8875a', stroke: '#3a2d1a', 'stroke-width': 1.6 }));
    fig.appendChild(sv('path', { d: 'M -17 -41 C -10 -35, -2 -34, 2 -37 M -13 -45 C -10 -39, -6 -33, -1 -31', fill: 'none', stroke: '#5c4a2e', 'stroke-width': 1.3, opacity: 0.9 }));
    // head forward of the load, chin down
    fig.appendChild(sv('circle', { cx: 8, cy: -38, r: 5.5, fill: '#b99a68', stroke: '#3a2d1a', 'stroke-width': 1.5 }));
    fig.appendChild(sv('path', { d: 'M 3.5 -41.5 C 5.5 -43.5, 10.5 -43.5, 12.5 -40.5', fill: 'none', stroke: '#3a2d1a', 'stroke-width': 1.8, 'stroke-linecap': 'round' }));
    // shu carry-strap, bundle to hip — the "you" accent
    fig.appendChild(sv('line', { x1: 0.5, y1: -31, x2: 4, y2: -20, stroke: '#bf3b25', 'stroke-width': 2, 'stroke-linecap': 'round' }));
  }, {
    gait: (t) => `translate(0 ${Math.sin(t * 0.016) * 3.5}) rotate(${Math.sin(t * 0.008) * 6})`,
  });
}

function buildMiniLord() {
  // 塗 — painted & lacquered lord: kamishimo shoulder wings, indigo over gold,
  // the tallest and most formal of the four. Stands on a black lacquer base.
  return makeStandee((fig) => {
    // hakama skirt
    fig.appendChild(sv('path', { d: 'M -13 -3 L 13 -3 L 8 -24 L -8 -24 Z', fill: '#2e3a5c', stroke: '#1a2236', 'stroke-width': 1.5 }));
    fig.appendChild(sv('path', { d: 'M -4 -5 L -3 -22 M 4 -5 L 3 -22', fill: 'none', stroke: '#1a2236', 'stroke-width': 1.1, opacity: 0.8 }));
    // chest column + gold mon
    fig.appendChild(sv('path', { d: 'M -6 -24 L 6 -24 L 5 -40 L -5 -40 Z', fill: '#3b4a6e', stroke: '#1a2236', 'stroke-width': 1.4 }));
    fig.appendChild(sv('circle', { cx: 0, cy: -31, r: 2.6, fill: '#d8b978' }));
    // kataginu wings
    fig.appendChild(sv('path', { d: 'M -2 -38 L -19 -43 L -8 -25 Z', fill: '#46578a', stroke: '#1a2236', 'stroke-width': 1.4, 'stroke-linejoin': 'round' }));
    fig.appendChild(sv('path', { d: 'M 2 -38 L 19 -43 L 8 -25 Z', fill: '#46578a', stroke: '#1a2236', 'stroke-width': 1.4, 'stroke-linejoin': 'round' }));
    // painted head, lacquer hair + topknot
    fig.appendChild(sv('circle', { cx: 0, cy: -45.5, r: 5.5, fill: '#d9c9a8', stroke: '#3a2d1a', 'stroke-width': 1.2 }));
    fig.appendChild(sv('path', { d: 'M -5.5 -46.5 A 5.5 5.5 0 0 1 5.5 -46.5 Z', fill: '#0e1016' }));
    fig.appendChild(sv('line', { x1: 0, y1: -51, x2: 0, y2: -55, stroke: '#0e1016', 'stroke-width': 2.4, 'stroke-linecap': 'round' }));
    // shu under-collar — the "you" accent
    fig.appendChild(sv('path', { d: 'M -4 -40 L 0 -36.5 L 4 -40', fill: 'none', stroke: '#bf3b25', 'stroke-width': 2, 'stroke-linecap': 'round' }));
  }, {
    base: 'lacquer',
    gait: (t) => `translate(0 ${Math.sin(t * 0.02) * 2}) rotate(${Math.sin(t * 0.01) * 1.5})`,
  });
}

function buildMiniCutout() {
  // 切絵 — a road-walker brushed in sumi ink and cut from paper, mounted on a
  // little wood block: deliberately FLAT among the carved pieces. Conical kasa,
  // swinging robe, mid-stride.
  const HAT = 'M -12 -44 L 12 -44 L 1.5 -54 Z';
  const ROBE =
    'M 0 -44 C 6 -40, 9 -34, 8 -27 C 12 -19, 14 -12, 12 -6 L 6 -6 L 4.5 -12 C 3 -9, 1 -7, -2 -6.5 L -8 -6 C -10.5 -13, -9.5 -23, -6 -31 C -8 -37, -7 -41, -3 -44 Z';
  return makeStandee((fig) => {
    // paper edge under both cuts, then the ink over it
    for (const d of [HAT, ROBE])
      fig.appendChild(sv('path', { d, fill: 'none', stroke: '#e7ecff', 'stroke-width': 3, 'stroke-linejoin': 'round', opacity: 0.85 }));
    for (const d of [HAT, ROBE])
      fig.appendChild(sv('path', { d, fill: '#101319', stroke: '#2a2f3d', 'stroke-width': 1 }));
    // trailing sleeve, one brush flick
    fig.appendChild(sv('path', { d: 'M 6 -30 C 11 -28, 14 -24, 15 -19 C 11 -21, 8 -24, 6 -27 Z', fill: '#101319', stroke: '#e7ecff', 'stroke-width': 0.8, opacity: 0.9 }));
    // dry-brush streaks in the ink
    fig.appendChild(sv('path', { d: 'M -3 -34 C -1 -27, 0 -18, -1 -11 M 3 -36 C 5 -29, 6 -20, 5 -13', fill: 'none', stroke: '#8a90a4', 'stroke-width': 1, opacity: 0.5 }));
    // shu hanko seal stamped on the hem — the "you" accent
    fig.appendChild(sv('rect', { x: 7.5, y: -14, width: 5, height: 5, rx: 0.8, fill: '#bf3b25', opacity: 0.9 }));
  }, {
    base: 'block',
    gait: (t) => `translate(0 ${Math.sin(t * 0.02) * 2.5}) rotate(${Math.sin(t * 0.018) * 7})`,
  });
}

function buildMiniHaniwa() {
  // 埴輪 — fired-clay peon: chunky flared cylinder, stub arms, hollow eyes.
  // The most "game piece" of the four; stands directly on the paper.
  return makeStandee((fig) => {
    // flared body
    fig.appendChild(sv('path', {
      d: 'M -12 -2 C -14 -16, -10 -32, 0 -34 C 10 -32, 14 -16, 12 -2 Z',
      fill: 'url(#clay)', stroke: '#5c3423', 'stroke-width': 1.6,
    }));
    // stub arms, out and down
    fig.appendChild(sv('path', { d: 'M -9 -26 C -14 -25, -17 -21, -17.5 -17 M 9 -26 C 14 -25, 17 -21, 17.5 -17', fill: 'none', stroke: '#a06544', 'stroke-width': 6, 'stroke-linecap': 'round' }));
    // coil lines (thrown clay)
    fig.appendChild(sv('path', { d: 'M -11 -12 C -4 -14, 4 -14, 11 -12 M -10 -20 C -4 -22, 4 -22, 10 -20', fill: 'none', stroke: '#5c3423', 'stroke-width': 1, opacity: 0.5 }));
    // round head, hollow eyes, shu headband — the "you" accent
    fig.appendChild(sv('circle', { cx: 0, cy: -41, r: 8.5, fill: 'url(#clay)', stroke: '#5c3423', 'stroke-width': 1.6 }));
    fig.appendChild(sv('path', { d: 'M -8 -44.5 C -3 -46.5, 3 -46.5, 8 -44.5', fill: 'none', stroke: '#bf3b25', 'stroke-width': 2.6 }));
    fig.appendChild(sv('ellipse', { cx: -3.4, cy: -41, rx: 1.7, ry: 2.5, fill: '#2a1610' }));
    fig.appendChild(sv('ellipse', { cx: 3.4, cy: -41, rx: 1.7, ry: 2.5, fill: '#2a1610' }));
  }, {
    gait: (t) => `translate(0 ${-Math.abs(Math.sin(t * 0.014)) * 6}) rotate(${Math.sin(t * 0.014) * 5})`,
  });
}

// koma / go stone / pilgrim-hat takes were REJECTED by the human 2026-07-11
// ("not the fit") — their builds live in git history at commit 73300fa1.
const TOKENS = {
  porter: { label: '根付 porter', build: buildMiniPorter },
  lord: { label: '塗 painted lord', build: buildMiniLord },
  cutout: { label: '切絵 ink cutout', build: buildMiniCutout },
  haniwa: { label: '埴輪 clay peon', build: buildMiniHaniwa },
};
const MOVES = {
  walk: { label: 'walk (footprints)', speed: 200 },
  slide: { label: 'slide (pushed)', speed: 340 },
  lift: { label: 'lift & place', speed: 420 },
};

// ══════════════════════════════════════════════════════════════════════════
// State + the animation driver
// ══════════════════════════════════════════════════════════════════════════
const state = {
  x: 2145, y: 1444, heading: 0, // start beside the forecourt seal, facing north
  tokenKind: 'porter', moveKind: 'walk',
  trip: null, // { fromX, fromY, toX, toY, dist, t0, dur, name }
  token: null,
  follow: false,
};

function mountToken() {
  tokenLayer.innerHTML = '';
  shadowLayer.innerHTML = '';
  state.token = TOKENS[state.tokenKind].build();
  shadowLayer.appendChild(state.token.shadow);
  tokenLayer.appendChild(state.token.body);
  positionToken(0, performance.now());
}

function positionToken(lift, now) {
  const t = state.token;
  const rot = t.rotates ? ` rotate(${state.heading})` : '';
  const liftY = lift * 26;
  t.body.setAttribute('transform',
    `translate(${state.x} ${state.y - liftY})${rot} scale(${1 + lift * 0.1})`);
  // shadow stays on the paper; separates + softens as the piece lifts
  const so = 1 + lift * 2.2;
  t.shadow.setAttribute('transform',
    `translate(${state.x + 4 * so} ${state.y + 5 * so})${rot} scale(${1 - lift * 0.18})`);
  t.shadow.setAttribute('opacity', 0.55 - lift * 0.3);
  t.shadow.setAttribute('filter', lift > 0.3 ? 'url(#softer)' : 'url(#soft)');
  t.onWalk(now, !!state.trip && state.moveKind === 'walk' && lift === 0);
}

// footprint trail (walk mode) — paired shu stamps that fade like drying ink
let lastStamp = { x: 0, y: 0 };
function stampFeet(x, y, heading) {
  const dx = x - lastStamp.x, dy = y - lastStamp.y;
  if (dx * dx + dy * dy < 34 * 34) return;
  lastStamp = { x, y };
  stampFeet.side = !stampFeet.side;
  const a = (heading * Math.PI) / 180;
  const px = Math.cos(a) * (stampFeet.side ? 7 : -7);
  const py = Math.sin(a) * (stampFeet.side ? 7 : -7);
  const g = sv('g', { transform: `translate(${x + px} ${y + py}) rotate(${heading})` });
  g.appendChild(sv('ellipse', { cx: 0, cy: 0, rx: 3.2, ry: 5.5, fill: 'var(--shu, #bf3b25)' }));
  g.style.opacity = 0.8;
  g.style.transition = 'opacity 4s linear';
  trailLayer.appendChild(g);
  requestAnimationFrame(() => { g.style.opacity = 0; });
  setTimeout(() => g.remove(), 4200);
}

function travelTo(x, y, name) {
  if (performance.now() < suppressClickUntil) return; // that click was a drag
  if (state.trip) return; // one move at a time — matches the game's timed moves
  const dist = Math.hypot(x - state.x, y - state.y);
  if (dist < 4) return;
  state.trip = {
    fromX: state.x, fromY: state.y, toX: x, toY: y, dist,
    t0: performance.now(),
    dur: Math.max(500, (dist / MOVES[state.moveKind].speed) * 1000),
    name: name || null,
  };
  state.heading = (Math.atan2(y - state.y, x - state.x) * 180) / Math.PI + 90;
  lastStamp = { x: state.x, y: state.y };
  document.getElementById('whereName').textContent = '…walking';
}

function travelToEvent(e) {
  const pt = overlay.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  const p = pt.matrixTransform(overlay.getScreenCTM().inverse());
  travelTo(p.x, p.y, null);
}

// lift-envelope for the lift & place move: up 0→15%, carry, down 85%→100%
function liftEnvelope(u) {
  if (state.moveKind !== 'lift') return 0;
  if (u < 0.15) return easeOut(u / 0.15);
  if (u > 0.85) return 1 - easeOut((u - 0.85) / 0.15);
  return 1;
}
const easeOut = (u) => 1 - (1 - u) * (1 - u);

// ── camera ──────────────────────────────────────────────────────────────────
const stage = document.getElementById('stage');
const cam = { x: 0, y: 0, s: 1, tx: 0, ty: 0, ts: 1 };
let stagePx = { w: 0, h: 0, unit: 1 };
function layoutStage() {
  const vw = innerWidth, vh = innerHeight;
  const scale = Math.min(vw / VB.w, vh / VB.h);
  stagePx = { w: VB.w * scale, h: VB.h * scale, unit: scale };
  stage.style.width = stagePx.w + 'px';
  stage.style.height = stagePx.h + 'px';
  stage.style.left = (vw - stagePx.w) / 2 + 'px';
  stage.style.top = (vh - stagePx.h) / 2 + 'px';
}
addEventListener('resize', layoutStage);
layoutStage();

// ── manual camera — scroll to zoom (STAYS zoomed, so the minis can be compared
//    up close — human 2026-07-11), drag to pan ────────────────────────────────
const view = { x: 0, y: 0, s: 1 };
let suppressClickUntil = 0;
const viewportEl = document.getElementById('viewport');
viewportEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  const s2 = Math.min(9, Math.max(1, view.s * Math.exp(-e.deltaY * 0.0016)));
  const k = s2 / view.s;
  view.x = e.clientX - k * (e.clientX - view.x);
  view.y = e.clientY - k * (e.clientY - view.y);
  view.s = s2;
  if (s2 === 1) { view.x = 0; view.y = 0; }
}, { passive: false });
let drag = null;
viewportEl.addEventListener('pointerdown', (e) => { drag = { x: e.clientX, y: e.clientY, moved: 0 }; });
addEventListener('pointermove', (e) => {
  if (!drag) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  drag.x = e.clientX; drag.y = e.clientY;
  drag.moved += Math.abs(dx) + Math.abs(dy);
  if (view.s > 1) { view.x += dx; view.y += dy; }
});
addEventListener('pointerup', () => {
  if (drag && drag.moved > 6) suppressClickUntil = performance.now() + 120;
  drag = null;
});

let settleTimer = 0;
function cameraTargets(now) {
  const FOLLOW_ZOOM = 2.1;
  const wantFollow = state.follow && (state.trip || now < settleTimer);
  if (wantFollow) {
    const z = Math.max(FOLLOW_ZOOM, view.s);
    cam.ts = z;
    // keep the token at viewport centre: token position in stage px
    const px = (state.x - VB.x) * stagePx.unit;
    const py = (state.y - VB.y) * stagePx.unit;
    cam.tx = innerWidth / 2 - (stage.offsetLeft + px * z);
    cam.ty = innerHeight / 2 - (stage.offsetTop + py * z);
  } else {
    // no trip (or follow off): hold the human's manual view — never snap back
    cam.ts = view.s; cam.tx = view.x; cam.ty = view.y;
  }
}

// ── the driver ──────────────────────────────────────────────────────────────
function frame(now) {
  let lift = 0;
  if (state.trip) {
    const tr = state.trip;
    const u = Math.min(1, (now - tr.t0) / tr.dur);
    // LINEAR travel (the ask) — constant speed across the paper
    state.x = tr.fromX + (tr.toX - tr.fromX) * u;
    state.y = tr.fromY + (tr.toY - tr.fromY) * u;
    lift = liftEnvelope(u);
    if (state.moveKind === 'walk') stampFeet(state.x, state.y, state.heading);
    if (u >= 1) {
      const name = tr.name;
      state.trip = null;
      settleTimer = now + 900; // camera lingers, then eases back to the fit view
      document.getElementById('whereName').textContent = name || 'the open ground';
    }
  }
  positionToken(lift, now);
  cameraTargets(now);
  const lerp = state.follow && (state.trip || now < settleTimer) ? 0.06 : 0.18;
  cam.s += (cam.ts - cam.s) * lerp;
  cam.x += (cam.tx - cam.x) * lerp;
  cam.y += (cam.ty - cam.y) * lerp;
  stage.style.transform = `translate(${cam.x}px, ${cam.y}px) scale(${cam.s})`;
  stage.style.transformOrigin = `${-stage.offsetLeft}px ${-stage.offsetTop}px`;
  requestAnimationFrame(frame);
}

// ── controls ────────────────────────────────────────────────────────────────
function chips(elId, defs, current, onPick) {
  const host = document.getElementById(elId);
  for (const [key, def] of Object.entries(defs)) {
    const b = document.createElement('button');
    b.className = 'chip' + (key === current ? ' on' : '');
    b.textContent = def.label;
    b.addEventListener('click', () => {
      host.querySelectorAll('.chip').forEach((c) => c.classList.remove('on'));
      b.classList.add('on');
      onPick(key);
    });
    host.appendChild(b);
  }
}
chips('tokenChips', TOKENS, state.tokenKind, (k) => { state.tokenKind = k; mountToken(); });
chips('moveChips', MOVES, state.moveKind, (k) => { state.moveKind = k; });
document.getElementById('followTog').addEventListener('change', (e) => {
  state.follow = e.target.checked;
});

window.__proto = { state, view, travelTo, VB, stagePxRef: () => stagePx, stage };
mountToken();
requestAnimationFrame(frame);
</script>
</body>
</html>
