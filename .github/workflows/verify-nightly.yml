# Nightly canary — a scheduled clean-clone run of the full gate roster + prod
# build, so we get a daily RED-able signal even on push-free days.
#
# Off-the-hour cron on purpose: GitHub delays on-the-hour schedules under load.
name: verify-nightly

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch: {}

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
      - run: pnpm run build
      - run: bash src/scripts/verify-dev-strip.sh
      # The process-scaffolding meta-suite (context-hardening P2): git hooks,
      # Claude guards, hookify rules, brief probes. Nightly-only ON PURPOSE —
      # it spawns dozens of processes; the commit roster keeps D-072's 5s budget.
      - run: pnpm run verify:tooling

      # --- FUTURE NIGHTLY-ONLY TENANTS (intentionally commented out) ---------
      # These are too slow / too broad for every-push CI and belong here on the
      # nightly cadence. They are COMMENTED, not present-but-skipping: a step
      # that silently no-ops when its script is missing is a gate that can never
      # go RED. The balance-sim plan (F4 §5a) un-comments the balance block when
      # `npm run verify:balance` actually exists; add soak suites likewise.
      #
      # - run: pnpm run verify:balance   # balance-sim matrix (F4 §5a)
      # - run: pnpm run verify:fuzz      # seeded fuzz sweep (F4)
      # - run: pnpm run soak             # future long-running soak suites
