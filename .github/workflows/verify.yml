# The FULL gate roster — `npm run verify` runs all 15 gates (the atomic
# lint/typecheck/test checks PLUS the 11 house-specific invariant gates:
# content/PRD verifiers, gen-region freshness, md-links, milestone-integrity,
# changelog, doc-budgets, checkpoint). This is the authoritative "everything
# passed" backstop; the atomic per-check workflows (lint/typecheck/test/build)
# exist alongside it so a failure reads meaningfully at a glance.
#
# Roster lives in ONE place — src/scripts/verify-run.ts (gates.ts) — never
# forked into YAML: every future gate lands here with zero workflow edits.
name: verify

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch: {}

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true # agents push often; newest commit wins

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run verify
