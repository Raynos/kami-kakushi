# CI verify — two parallel jobs on every push.
#
# This workflow deliberately REUSES `npm run verify` rather than forking the
# gate roster into YAML. The gate roster lives in ONE place —
# src/scripts/verify-run.ts — so the Ph3 lint swap and every future gate land
# in CI with zero edits here. The gates already run wide inside the single job.
name: verify

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true # agents push often; newest commit wins

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run verify

  build-strip:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - run: bash src/scripts/verify-dev-strip.sh
