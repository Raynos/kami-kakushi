# Atomic check — test (the FULL vitest suite: all *.test.ts, 0 excluded/skipped).
# Its own status check so a test failure reads as "test ✗" at a glance.
name: test

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch: {}

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test # vitest run — the whole suite
