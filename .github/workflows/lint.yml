# Atomic check — lint (oxlint) + format (oxfmt). Its own status check so a
# style/rule failure reads as "lint ✗" at a glance, not an opaque "verify ✗".
# The full `pnpm run verify` (verify.yml) still runs the whole roster as the
# authoritative backstop.
name: lint

on:
  push:
    branches-ignore: [gh-pages]
  workflow_dispatch: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint # oxlint (incl. the pure-core boundary rules)
      - run: pnpm run format:check # oxfmt --check
