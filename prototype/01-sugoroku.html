<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kami-kakushi — Shusse Sugoroku</title>
<style>
/* ============ SHUSSE SUGOROKU 出世双六 — the promotion board ============ */
:root{
  --kinari:#E8DCC0;        /* washi ground */
  --washi:#E8DCC0;         /* season-shifted sheet tone */
  --washi-fresh:#EFE6CE;   /* newly printed square face */
  --sumi:#2A241C;          /* keyblock ink */
  --sumi-soft:rgba(42,36,28,.62);
  --sumi-faint:rgba(42,36,28,.30);
  --shu:#A93B26;           /* vermilion — MILESTONES ONLY */
  --ai:#3E5C6B;            /* indigo block */
  --odo:#C0913F;           /* ochre block */
  --matsuba:#6E7A57;       /* pine */
  --backing:#211B14;       /* behind the sheet */
  --karazuri:rgba(255,252,240,.55); /* faked embossing line */
  --season-ink:#6E7A57;
  /* type scale — five sizes, no ad-hoc */
  --t1:11px; --t2:13px; --t3:15px; --t4:22px; --t5:36px;
  --f-title:"Toppan Bunkyu Midashi Mincho","Toppan Bunkyu Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
  --f-body:"Hiragino Mincho ProN","Yu Mincho","Iowan Old Style",Georgia,serif;
  --f-hand:"Klee","Hiragino Maru Gothic ProN","Hiragino Mincho ProN",serif;
  --f-num:"Iowan Old Style",Baskerville,"Hoefler Text",Palatino,Georgia,serif;
  --ease-out:cubic-bezier(.25,.6,.3,1);
  --ease-hop:cubic-bezier(.3,-.2,.2,1);
  --cam-ease:cubic-bezier(.22,.61,.36,1);
}
body[data-season="summer"]{--washi:#E4DDBB;--washi-fresh:#ECE6C9;--season-ink:#3E5C6B}
body[data-season="autumn"]{--washi:#EBDCB4;--washi-fresh:#F1E5C2;--season-ink:#A46F2B}
body[data-season="winter"]{--washi:#EAE4D5;--washi-fresh:#F1ECDF;--season-ink:#5E6E7A}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--backing);font-family:var(--f-body);color:var(--sumi);
     font-size:var(--t2)}
.num{font-family:var(--f-num);font-variant-numeric:tabular-nums;
     display:inline-block;text-align:right}

/* ---------- board viewport ---------- */
#viewport{position:fixed;inset:0;cursor:grab;touch-action:none}
#viewport.dragging{cursor:grabbing}
#board{width:100%;height:100%;display:block}
#camera{transition:transform .9s var(--cam-ease)}
#camera.no-ease{transition:none}

/* sheet + fold creases */
.sheet{fill:var(--washi);transition:fill .9s ease}
.crease{stroke:var(--sumi);stroke-width:1;opacity:.07}
.kento{stroke:var(--sumi);stroke-width:1.5;fill:none;opacity:.28}

/* ---------- squares: the impression ---------- */
.sq{opacity:0}
.sq.on{opacity:1}
.sq .face{fill:var(--washi-fresh);stroke:none}
.sq .clrblk{opacity:.32;transition:transform .3s var(--ease-out)}
.sq .clrblk.misreg{transform:translate(2px,1.5px)}
.sq .kb{fill:none;stroke:var(--sumi);stroke-width:1.5}
.sq.rung .kb{stroke-width:2.5}
.sq .kara{fill:none;stroke:var(--karazuri);stroke-width:1}
/* printed scene motif / pictogram — one keyblock illustration per square */
.sq .motif{fill:none;stroke:var(--sumi);stroke-width:1.6;stroke-linecap:round;
  stroke-linejoin:round;opacity:.78}
.sq.ghost .motif,.sq.fog .motif{display:none}
.sq text{fill:var(--sumi);font-family:var(--f-title)}
/* board-plane type runs a step above the HUD scale — it is read through the
   zoomed-out camera (~0.6×), so 24/26px land near the HUD's 15px */
.sq .title{font-size:24px;letter-spacing:.02em}
.sq.rung .title{font-size:26px}
.sq .lbl{font-family:var(--f-body);font-size:13px;fill:var(--sumi-soft)}
.sq .bank{font-family:var(--f-num);font-variant-numeric:tabular-nums;
          font-size:17px;fill:var(--sumi)}
/* keyblock press-in — animated on the inner .body wrapper, NEVER on the
   positioned outer group (a CSS transform animation would override the SVG
   translate attribute and pile every square at the sheet origin) */
@keyframes pressIn{from{opacity:0;transform:scale(1.02)}to{opacity:1;transform:scale(1)}}
.sq .body.pressing{animation:pressIn .4s var(--ease-out) both;transform-origin:center;transform-box:fill-box}
/* ghosts — visible mysteries */
.sq.ghost{opacity:.3}
.sq.ghost .face{fill:none}
.sq.ghost .clrblk{display:none}
.sq.ghost .kb{stroke-dasharray:4 6;stroke-width:1}
.sq.ghost .kara{display:none}
.sq.ghost text{opacity:.75;filter:url(#smudge)}
.sq.ghost .lbl,.sq.ghost .bank{display:none}
.sq.ghost2{opacity:.25}
.sq.fog .kb,.sq.fog text,.sq.fog .lbl,.sq.fog .kara{display:none}
.sq.fog .face{fill:none}
.smudgeblob{fill:var(--sumi);opacity:.14;filter:url(#smudge)}
/* earned rung seal — vermilion, milestone only */
.seal{fill:var(--shu);opacity:.9}
.seal-k{fill:var(--washi);font-family:var(--f-title);font-size:var(--t1)}
@keyframes stampIn{0%{opacity:0;transform:scale(1.4) rotate(-4deg)}
                   100%{opacity:1;transform:scale(1) rotate(0deg)}}
.stamping{animation:stampIn .2s ease-in both;transform-origin:center;transform-box:fill-box}
.cere-title{fill:var(--shu);font-family:var(--f-title);font-size:var(--t5)}
.cere-cap{font-family:var(--f-body);font-size:var(--t2);line-height:1.55;
          color:var(--sumi);width:100%}
.cere-cap .who{color:var(--sumi-soft);font-size:var(--t1);letter-spacing:.12em;
          text-transform:uppercase;display:block;margin-bottom:3px}

/* tally strokes */
.tally line{stroke:var(--sumi);stroke-width:1.8;stroke-linecap:round}
.tally line.pale{stroke:var(--sumi-faint);stroke-width:1;stroke-dasharray:2 3}
.meter-txt{font-family:var(--f-num);font-variant-numeric:tabular-nums;
           font-size:15px;fill:var(--sumi-soft)}

/* connectors — the path is a printed double keyline */
.conn{opacity:.55}
.conn line{stroke:var(--sumi);stroke-width:1.5;stroke-linecap:round;fill:none}
.conn.ghostly{opacity:.22}
.conn.ghostly line{stroke-dasharray:2 6}

/* koma — the folded-paper piece */
#koma{transition:transform .5s var(--ease-hop)}
#koma .paper{fill:#F4ECD8;stroke:var(--sumi);stroke-width:2}
#koma .fold{stroke:var(--sumi);stroke-width:1;opacity:.5;fill:none}
@keyframes hopArc{0%{transform:translateY(0)}45%{transform:translateY(-26px)}
                  100%{transform:translateY(0)}}
#koma .arc.hopping{animation:hopArc .5s var(--ease-hop)}
@keyframes squat{from{transform:scaleY(1)}to{transform:scaleY(.82)}}
#koma .arc.squatting{animation:squat .12s ease-in both;transform-origin:bottom center;transform-box:fill-box}
@keyframes rock{0%{transform:rotate(2deg)}100%{transform:rotate(0)}}
#koma .arc.rocking{animation:rock .15s ease-out both;transform-origin:bottom center;transform-box:fill-box}
#koma.fade{transition:opacity .12s linear}

/* quest slip */
.slip{fill:#F4ECD8;stroke:var(--sumi);stroke-width:1}
.slip-t{font-family:var(--f-body);font-size:var(--t1);fill:var(--sumi-soft)}

/* ---------- fixed margins (HUD) ---------- */
#margin-date{position:fixed;top:14px;left:18px;font-family:var(--f-body);
  font-size:var(--t3);color:var(--sumi);letter-spacing:.14em;
  display:flex;align-items:center;gap:10px;pointer-events:none;z-index:6}
#margin-date .season-k{color:var(--season-ink)}
#margin-date .koku{font-size:var(--t2);color:var(--sumi-soft);letter-spacing:.05em}
#d-rank{font-family:var(--f-title);font-size:var(--t2);letter-spacing:.1em;
  border:1px solid var(--sumi-soft);padding:1px 7px 2px}
#moon{opacity:.6}

/* recorder's strip 記 */
#recorder{position:fixed;top:0;right:0;bottom:64px;width:272px;z-index:5;
  background:var(--washi);border-left:2.5px solid var(--sumi);
  display:flex;flex-direction:column;transition:background .9s ease}
#recorder::before{content:"";position:absolute;left:3px;top:0;bottom:0;
  width:0;border-left:1px solid var(--karazuri)}
#rec-head{padding:12px 16px 8px;border-bottom:1px solid var(--sumi-faint);
  display:flex;align-items:baseline;gap:8px}
#rec-head .k{font-family:var(--f-title);font-size:var(--t4)}
#rec-head .r{font-family:var(--f-body);font-size:var(--t1);letter-spacing:.28em;
  color:var(--sumi-soft);text-transform:uppercase}
#rec-scroll{flex:1;overflow-y:auto;padding:10px 16px 16px;scrollbar-width:thin}
.rec-entry{font-family:var(--f-hand);font-size:var(--t2);line-height:1.62;
  color:#3A3226;margin:0 0 12px;animation:inkIn .4s var(--ease-out) both}
.rec-entry.milestone{border-left:2px solid var(--shu);padding-left:8px;color:var(--sumi)}
.rec-entry.dim{color:var(--sumi-soft)}
.rec-entry .n{font-family:var(--f-num);font-variant-numeric:tabular-nums}
@keyframes inkIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}

/* colophon — the publisher's margin */
#colophon{position:fixed;left:0;right:0;bottom:0;height:64px;z-index:6;
  background:var(--washi);border-top:2.5px solid var(--sumi);
  display:flex;align-items:center;gap:0;padding:0 14px;overflow-x:auto;
  font-size:var(--t3);transition:background .9s ease}
#colophon::after{content:"";position:absolute;left:0;right:0;top:3px;
  border-top:1px solid var(--karazuri)}
.col-sec{display:flex;align-items:center;gap:8px;padding:0 14px;height:36px;
  border-right:1px solid var(--sumi-faint);white-space:nowrap;flex:0 0 auto}
.col-sec:last-child{border-right:none}
.col-sec .k{font-family:var(--f-title);font-size:var(--t3)}
.col-sec .sub{font-size:var(--t1);color:var(--sumi-soft);letter-spacing:.08em}
.res{display:inline-flex;align-items:baseline;gap:3px}
.res .num{min-width:2.6ch;font-size:var(--t3)}
#hpbar{display:inline-block}
#hpbar rect{transition:opacity .5s var(--ease-out)}
#c-skills .sealbox{display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border:1.5px solid var(--sumi);gap:1px;
  font-family:var(--f-title);font-size:var(--t1);position:relative}
#c-skills .sealbox .lv{position:absolute;right:-4px;bottom:-6px;
  font-family:var(--f-num);font-size:var(--t1);color:var(--sumi-soft)}
#c-hanmoto{font-family:var(--f-title);letter-spacing:.1em;color:var(--sumi-soft);
  cursor:default;border:1px solid var(--sumi-faint);padding:2px 8px;margin-left:auto}
.hidden{display:none !important}

/* corners — kento registration marks + (late) pillars */
.corner{position:fixed;width:52px;height:52px;z-index:4;pointer-events:none;opacity:.35;
  transition:opacity .4s ease}
.corner svg{display:block}
.corner .pillar-k{font-family:var(--f-title);font-size:var(--t2);fill:var(--sumi)}
.corner .pillar-n{font-family:var(--f-num);font-variant-numeric:tabular-nums;
  font-size:var(--t1);fill:var(--sumi-soft)}
#cnw{top:10px;left:10px}#cne{top:10px;right:284px}
#csw{bottom:76px;left:10px}#cse{bottom:76px;right:284px;width:84px}
.corner.reading{opacity:1}
.corner.reading svg .km{stroke:var(--shu)}

/* overlays: pre-dawn + candlelight */
#dawn,#candle{position:fixed;inset:0;pointer-events:none;z-index:8;
  opacity:0;transition:opacity 1.2s ease}
#dawn{background:radial-gradient(ellipse at 50% 46%,rgba(20,16,10,0) 12%,rgba(20,16,10,.88) 78%)}
#candle{background:radial-gradient(ellipse at 50% 44%,rgba(64,38,8,0) 22%,rgba(38,22,5,.5) 85%)}
body.minute-one #dawn{opacity:1}
body.judging #candle{opacity:1}

/* kiwame 極 censor's seal */
#kiwame{position:fixed;top:52px;right:300px;z-index:9;width:84px;height:84px;
  border:3px solid var(--shu);color:var(--shu);display:none;
  align-items:center;justify-content:center;flex-direction:column;
  font-family:var(--f-title);background:var(--washi);
  transform:rotate(-3deg)}
#kiwame.show{display:flex;animation:stampIn .2s ease-in both}
#kiwame .kk{font-size:var(--t5);line-height:1}
#kiwame .koku{font-size:var(--t2);letter-spacing:.05em}
#kiwame .koku .num{min-width:2.2ch}

/* ---------- fight panel — the ukiyo-e detour ---------- */
#fight{position:fixed;z-index:10;left:50%;top:46%;transform:translate(-50%,-50%);
  width:min(560px,92vw);background:var(--washi);display:none;
  border:3px solid var(--sumi);outline:1px solid var(--karazuri);outline-offset:-6px;
  padding:22px 24px 18px}
#fight.open{display:block;animation:pressIn .4s var(--ease-out) both}
#fight .f-head{display:flex;align-items:flex-start;gap:18px;margin-bottom:10px}
#fight .f-k{font-family:var(--f-title);font-size:var(--t5);line-height:1;
  border:2.5px solid var(--sumi);padding:8px 10px}
#fight .f-name{font-size:var(--t3);letter-spacing:.05em}
#fight .f-blurb{font-size:var(--t2);color:var(--sumi-soft);line-height:1.55;max-width:30em}
#fight .f-odds{margin-left:auto;text-align:center;border-left:1px solid var(--sumi-faint);
  padding-left:16px}
#fight .f-odds .vert{writing-mode:vertical-rl;font-family:var(--f-title);
  font-size:var(--t3);letter-spacing:.2em;margin:0 auto}
#fight .f-odds .pct{font-family:var(--f-num);font-variant-numeric:tabular-nums;
  font-size:var(--t4);display:block;margin-top:6px}
#fight .f-weapon{font-size:var(--t1);color:var(--sumi-soft);letter-spacing:.08em;
  margin-bottom:12px}
#stances{display:flex;gap:18px;justify-content:center;margin:6px 0 4px}
.stance{background:none;border:none;cursor:pointer;text-align:center;
  font-family:var(--f-title);color:var(--sumi);padding:4px}
.stance svg{display:block;margin:0 auto 4px}
.stance .enso{fill:none;stroke:var(--sumi);stroke-width:2;stroke-linecap:round;
  stroke-dasharray:170 30;transition:fill .2s ease}
.stance .s-k{font-size:var(--t3)}
.stance .s-sub{font-family:var(--f-num);font-size:var(--t1);color:var(--sumi-soft);
  display:block;margin-top:2px}
.stance:hover .enso,.stance:focus-visible .enso{stroke-width:3}
.stance.picked .enso{fill:rgba(42,36,28,.12)}
.stance[disabled]:not(.picked){cursor:default;opacity:.45}
.stance[disabled]{cursor:default}
#exchange{height:86px;margin-top:8px;position:relative;display:none}
#exchange.on{display:block}
#exchange .slash{stroke:var(--sumi);stroke-width:3;stroke-linecap:round;fill:none}
#exchange .f-hp{position:absolute;left:4px;bottom:2px;font-size:var(--t2);
  color:var(--sumi)}
#f-result{font-size:var(--t2);line-height:1.55;margin-top:10px;display:none}
#f-result.on{display:block;animation:inkIn .4s var(--ease-out) both}

/* dev strip — quiet chrome, exempt from period styling */
#dev{position:fixed;right:10px;bottom:72px;z-index:20;
  background:#17130E;color:#9A8F7C;border:1px solid #322A20;
  font:10px/1.6 ui-monospace,Menlo,monospace;padding:5px 7px;opacity:.55;
  transition:opacity .2s;display:flex;flex-wrap:wrap;gap:3px;align-items:center;
  max-width:270px}
#dev:hover,#dev:focus-within{opacity:1}
#dev .dv-label{color:#6E6252;margin-right:4px;letter-spacing:.06em}
#dev button{background:#211B14;color:#B5A88F;border:1px solid #3A3226;
  font:inherit;padding:1px 6px;cursor:pointer}
#dev button:hover{color:#E8DCC0;border-color:#6E6252}
#dev button[data-dev="auto"].on{color:#E8DCC0;border-color:#8A7B5F}

button:focus-visible,.stance:focus-visible{outline:1.5px dashed var(--sumi);outline-offset:2px}
#dev button:focus-visible{outline:1.5px dashed #B5A88F;outline-offset:1px}

/* count-dip for reduced-motion + number settles */
@keyframes dip{from{opacity:.25}to{opacity:1}}
.dip{animation:dip .12s ease-out both}

/* ---------- mobile ---------- */
@media (max-width:719px){
  #recorder{top:auto;left:0;right:0;bottom:64px;width:auto;height:92px;
    border-left:none;border-top:2px solid var(--sumi)}
  #rec-head{padding:6px 12px 4px}
  #rec-scroll{padding:6px 12px 10px}
  #cne,#cse{right:10px}
  #csw,#cse{bottom:172px}
  #kiwame{right:16px;top:44px}
  #dev{bottom:162px}
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.12s !important;transition-duration:.12s !important}
  #camera{transition:none}
}
</style>
</head>
<body data-season="spring">

<div id="viewport">
<svg id="board" xmlns="http://www.w3.org/2000/svg" aria-label="Shusse sugoroku — the promotion board">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0 0.08  0 0 0 0.055 0"/>
    </filter>
    <filter id="smudge"><feGaussianBlur stdDeviation="1.3"/></filter>
  </defs>
  <g id="camera" style="transform-origin:0 0">
    <rect class="sheet" x="100" y="-180" width="2800" height="2280"/>
    <rect x="100" y="-180" width="2800" height="2280" filter="url(#grain)" style="pointer-events:none"/>
    <line class="crease" x1="1010" y1="-180" x2="1010" y2="2100"/>
    <line class="crease" x1="1720" y1="-180" x2="1720" y2="2100"/>
    <line class="crease" x1="100" y1="900" x2="2900" y2="900"/>
    <g id="conns"></g>
    <g id="squares"></g>
    <g id="marks"></g>
    <g id="koma"><g class="arc">
      <polygon class="paper" points="0,-44 17,0 -17,0"/>
      <line class="fold" x1="0" y1="-44" x2="0" y2="0"/>
    </g></g>
  </g>
</svg>
</div>

<div id="margin-date">
  <span id="d-era">安永九年</span>
  <span class="season-k" id="d-season">春</span>
  <span id="d-day">十四日</span>
  <span id="d-rank" title="rank">門番</span>
  <svg id="moon" width="14" height="14" viewBox="0 0 14 14" aria-hidden="true">
    <circle cx="7" cy="7" r="6" fill="none" stroke="#2A241C" stroke-width="1"/>
    <path id="moon-fill" d="M7 1 A6 6 0 0 1 7 13 A3.4 6 0 0 0 7 1 Z" fill="#2A241C" opacity=".7"/>
  </svg>
  <span class="koku">石 <span class="num" id="n-koku" style="min-width:2.2ch">8</span></span>
</div>

<aside id="recorder" aria-label="recorder's strip">
  <div id="rec-head"><span class="k">記</span><span class="r">Record</span></div>
  <div id="rec-scroll"></div>
</aside>

<footer id="colophon">
  <div class="col-sec" id="c-vitals">
    <span class="k">命</span>
    <svg id="hpbar" width="96" height="12" aria-hidden="true"></svg>
    <span><span class="num" id="n-hp" style="min-width:2.2ch">46</span><span class="sub"> / <span class="num" id="n-hpmax">58</span></span></span>
    <span class="k" style="font-size:var(--t1)">腹</span>
    <span><span class="num" id="n-sat" style="min-width:2.2ch">51</span><span class="sub"> / 64</span></span>
  </div>
  <div class="col-sec" id="c-carried">
    <span class="k">携</span>
    <span class="res"><span class="k">米</span><span class="num" id="n-rice">12</span></span>
    <span class="res"><span class="k">文</span><span class="num" id="n-coin">34</span></span>
    <span class="res"><span class="k">薪</span><span class="num" id="n-wood">5</span></span>
    <span class="res"><span class="k">菜</span><span class="num" id="n-sansai">3</span></span>
    <span class="res hidden" id="r-hardwood"><span class="k">堅</span><span class="num" id="n-hardwood">0</span></span>
    <span class="res hidden" id="r-sinew"><span class="k">腱</span><span class="num" id="n-sinew">0</span></span>
  </div>
  <div class="col-sec" id="c-skills"></div>
  <div class="col-sec" id="c-weapon">
    <span class="k" id="w-k">天秤棒</span>
    <span class="sub" id="w-state">worn · <span class="num" id="n-wear">34</span>/<span class="num" id="n-wearmax">40</span></span>
  </div>
  <div class="col-sec" id="c-hanmoto" title="版元 — settings">版元</div>
</footer>

<div class="corner" id="cnw"><svg width="52" height="52"><path class="km" d="M4 20 V4 H20" fill="none" stroke="#2A241C" stroke-width="1.5"/></svg></div>
<div class="corner" id="cne"><svg width="52" height="52"><path class="km" d="M32 4 H48 V20" fill="none" stroke="#2A241C" stroke-width="1.5"/></svg></div>
<div class="corner" id="csw"><svg width="52" height="52"><path class="km" d="M4 32 V48 H20" fill="none" stroke="#2A241C" stroke-width="1.5"/></svg></div>

const NS = 'http://www.w3.org/2000/svg';
const $  = s => document.querySelector(s);
function E(tag, attrs, parent){
  const n = document.createElementNS(NS, tag);
  for (const k in (attrs||{})) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}
function fmt(n){
  n = Math.round(n);
  return n >= 1000 ? String(n).replace(/(\d)(?=(\d{3})+$)/g, '$1 ') : String(n);
}
const timers = [];
function after(ms, fn){ timers.push(setTimeout(fn, ms)); }
function clearTimers(){ while (timers.length) clearTimeout(timers.pop()); }
function easeOutCubic(t){ return 1 - Math.pow(1 - t, 3); }
function countUp(el, to, ms){
  if (!el) return;
  const from = parseFloat(String(el.textContent).replace(/[^\d.-]/g, '')) || 0;
  if (RM || ms === 0){ el.textContent = fmt(to); el.classList.remove('dip'); void el.offsetWidth; el.classList.add('dip'); return; }
  const t0 = performance.now(); ms = ms || 500;
  (function step(t){
    const p = Math.min(1, (t - t0) / ms);
    el.textContent = fmt(from + (to - from) * easeOutCubic(p));
    if (p < 1) requestAnimationFrame(step);
  })(t0);
}

function vTitle(g, s){
  const chars = [...s.k];
  const size = s.rung != null ? 26 : 24, lh = size * 1.08;
  const startY = s.rung != null ? 40
    : (s.h/2 - ((chars.length-1)*lh)/2 + 8);
  const t = E('text', {class:'title', 'text-anchor':'middle'}, g);
  chars.forEach((c,i)=>{
    const ts = E('tspan', {x:s.w/2, y:startY + i*lh}, t);
    ts.textContent = c;
  });
}

function buildSquare(s){
  const outer = E('g', {class:'sq'+(s.rung != null?' rung':''), id:'sq-'+s.id,
    transform:`translate(${s.x-s.w/2},${s.y-s.h/2})`}, $('#squares'));
  const g = E('g', {class:'body'}, outer);
  E('rect', {class:'face', width:s.w, height:s.h}, g);
  if (s.clr){
    const cb = E('rect', {class:'clrblk misreg', x:0, y:0, width:s.w,
      height:Math.round(s.h*.4)}, g);
    cb.style.fill = `var(--${s.clr})`;
  }
  if (MOTIFS[s.id]){
    let mx, my, msc;
    if (s.rung != null){ mx = 10; my = 8; msc = .85; }
    else {
      msc = Math.min(1.15, s.h*.4/34);
      mx = (s.w - 32*msc)/2; my = (s.h*.4 - 32*msc)/2;
    }
    const mg = E('g', {class:'motif',
      transform:`translate(${mx.toFixed(1)},${my.toFixed(1)}) scale(${msc})`}, g);
    E('path', {d:MOTIFS[s.id]}, mg);
  }
  E('rect', {class:'kb', width:s.w, height:s.h}, g);
  E('rect', {class:'kara', x:3.5, y:3.5, width:s.w-7, height:s.h-7}, g);
  vTitle(g, s);
  if (s.lbl){
    const l = E('text', {class:'lbl', x:s.w-9, y:s.h-10, 'text-anchor':'end'}, g);
    l.textContent = s.lbl;
  }
  if (s.bank){
    const b1 = E('text', {class:'bank', x:s.w/2, y:s.h-44, 'text-anchor':'middle'}, g);
    b1.textContent = '米 ';
    E('tspan', {id:'n-bank-rice'}, b1).textContent = '210';
    const b2 = E('text', {class:'bank', x:s.w/2, y:s.h-22, 'text-anchor':'middle'}, g);
    b2.textContent = '文 ';
    E('tspan', {id:'n-bank-coin'}, b2).textContent = '60';
  }
  if (s.quest){
    const q = E('g', {id:'quest-slip', transform:`translate(${s.w-64},-12) rotate(-4)`}, g);
    E('rect', {class:'slip', width:60, height:34}, q);
    const qt = E('text', {class:'slip-t', x:30, y:14, 'text-anchor':'middle'}, q);
    qt.textContent = 'crop-raiders';
    const qc = E('text', {class:'slip-t', x:30, y:27, 'text-anchor':'middle'}, q);
    E('tspan', {id:'q-count'}, qc).textContent = '1 / 3';
  }
  if (s.rung){
    E('g', {class:'tally', id:'tally-'+s.id}, g);
    E('text', {class:'meter-txt hidden', id:'meter-'+s.id, x:s.w-10, y:s.h-12,
      'text-anchor':'end'}, g);
    E('circle', {class:'seal hidden', cx:s.w-27, cy:27, r:13}, g);
  }
  return outer;
}

function buildConns(){
  const c = $('#conns');
  function keyline(id, a, b){
    /* the printed double keyline — two parallel sumi rules, trimmed to run
       edge to edge between the squares, not centre to centre */
    const dx = b.x-a.x, dy = b.y-a.y, len = Math.hypot(dx,dy) || 1;
    const ux = dx/len, uy = dy/len;
    const tA = Math.min(Math.abs((a.w/2+7)/(ux||1e-6)), Math.abs((a.h/2+7)/(uy||1e-6)));
    const tB = Math.min(Math.abs((b.w/2+7)/(ux||1e-6)), Math.abs((b.h/2+7)/(uy||1e-6)));
    if (tA + tB >= len) return;
    const x1 = a.x+ux*tA, y1 = a.y+uy*tA, x2 = b.x-ux*tB, y2 = b.y-uy*tB;
    const nx = -uy*2.4, ny = ux*2.4;
    const g = E('g', {class:'conn', id}, c);
    E('line', {x1:(x1+nx).toFixed(1), y1:(y1+ny).toFixed(1),
               x2:(x2+nx).toFixed(1), y2:(y2+ny).toFixed(1)}, g);
    E('line', {x1:(x1-nx).toFixed(1), y1:(y1-ny).toFixed(1),
               x2:(x2-nx).toFixed(1), y2:(y2-ny).toFixed(1)}, g);
  }
  for (let i=0; i<SQUARES.length-1; i++)
    keyline('conn-'+SQUARES[i].id+'-'+SQUARES[i+1].id, SQUARES[i], SQUARES[i+1]);
  DETOURS.forEach(d=>keyline('conn-'+d.id, byId[d.off], d));
}

/* ================= square state + the IMPRESSION ================= */
function setSquareState(id, state){
  const g = $('#sq-'+id); if (!g) return;
  sqState[id] = state;
  g.classList.remove('on','ghost','ghost2','fog');
  const body = g.querySelector('.body');
  if (body) body.classList.remove('pressing');
  if (state === 'ghost')  g.classList.add('on','ghost');
  else if (state === 'ghost2') g.classList.add('on','ghost','ghost2');
  else if (state === 'fog')    g.classList.add('on','fog');
  else if (state === 'printed' || state === 'sealed'){
    g.classList.add('on');
    const cb = g.querySelector('.clrblk');
    if (cb){ cb.classList.remove('misreg'); cb.style.opacity=''; }
  }
  const seal = g.querySelector('.seal');
  if (seal) seal.classList.toggle('hidden', state !== 'sealed');
  updateConns();
}

function updateConns(){
  const vis = id => sqState[id] && sqState[id] !== 'hidden';
  const solid = id => sqState[id] === 'printed' || sqState[id] === 'sealed';
  for (let i=0; i<SQUARES.length-1; i++){
    const a=SQUARES[i], b=SQUARES[i+1];
    const ln = $('#conn-'+a.id+'-'+b.id); if (!ln) continue;
    if (!vis(a.id) || !vis(b.id)) ln.style.opacity = '0';
    else { ln.style.opacity=''; ln.classList.toggle('ghostly', !(solid(a.id)&&solid(b.id))); }
  }
  DETOURS.forEach(d=>{
    const ln = $('#conn-'+d.id); if (!ln) return;

/* ================= tally + meter ================= */
function strokeLine(sq, n){
  const bw=16, gap=7, cols=5;
  const x0=(sq.w-(cols*bw+(cols-1)*gap))/2, y0=sq.h-104, rowGap=28;
  const b=Math.floor(n/5), i=n%5;
  const bx=x0+(b%5)*(bw+gap), by=y0+Math.floor(b/5)*rowGap;
  const c=STROKES[i];
  return {x1:bx+c[0], y1:by+c[1], x2:bx+c[2], y2:by+c[3]};
}
function buildTally(sq){
  const g = $('#tally-'+sq.id); if (!g) return;
  g.textContent = '';
  for (let n=0; n<50; n++){
    const p = strokeLine(sq, n);
    E('line', {class:'pale', x1:p.x1, y1:p.y1, x2:p.x2, y2:p.y2}, g);
  }
}
function setStrokes(sq, count){
  const g = $('#tally-'+sq.id); if (!g) return;
  g.querySelectorAll('.drawn').forEach(n=>n.remove());
  for (let n=0; n<count; n++){
    const p = strokeLine(sq, n);
    E('line', {class:'drawn', x1:p.x1, y1:p.y1, x2:p.x2, y2:p.y2}, g);
  }
}
function drawStroke(sq, n){
  const g = $('#tally-'+sq.id); if (!g || n>=50) return;
  const p = strokeLine(sq, n);
  const ln = E('line', {class:'drawn', x1:p.x1, y1:p.y1, x2:p.x2, y2:p.y2}, g);
  if (RM){ ln.classList.add('dip'); return; }
  const len = Math.hypot(p.x2-p.x1, p.y2-p.y1);
  ln.style.strokeDasharray = len;
  ln.style.strokeDashoffset = len;
  ln.style.transition = 'stroke-dashoffset .24s cubic-bezier(.25,.6,.3,1)';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{ ln.style.strokeDashoffset='0'; }));
}
function strokesFor(){
  const need = RUNGS[S.next] ? RUNGS[S.next].need : 1;
  return Math.min(50, Math.round(50*S.meter/need));
}
function setNextRungFace(){
  const id = 'r'+S.next; const sq = byId[id]; if (!sq) return;
  buildTally(sq);
  setStrokes(sq, strokesFor());
  const mt = $('#meter-'+id); if (!mt) return;
  mt.classList.remove('hidden');
  mt.textContent = '';
  const tn = E('tspan', {id:'meter-n'}, mt);
  tn.textContent = fmt(S.meter);
  E('tspan', {}, mt).textContent = ' / ' + fmt(RUNGS[S.next].need);
}

/* ================= koma ================= */
function komaPos(id){ const s = byId[id]; return {x:s.x - s.w/2 + 28, y:s.y + s.h/2 - 8}; }
function placeKoma(id, eased){
  komaAt = id;
  const k = $('#koma'), p = komaPos(id);
  if (!eased){ k.style.transition = 'none'; }
  k.style.transform = `translate(${p.x}px,${p.y}px)`;
  if (!eased){ void k.getBoundingClientRect(); k.style.transition = ''; }
}
function hop(id, done){
  const k = $('#koma');
  if (RM){
    k.style.opacity = '0';
    after(120, ()=>{ placeKoma(id, false); k.style.opacity='1'; if (done) done(); });
    return;
  }
  const arc = k.querySelector('.arc');
  arc.classList.add('squatting');                        // 120ms squat
  after(120, ()=>{
    arc.classList.remove('squatting');
    arc.classList.add('hopping');                        // 500ms arc
    placeKoma(id, true);
    after(500, ()=>{
      arc.classList.remove('hopping');
      arc.classList.add('rocking');                      // 2° landing rock
      after(150, ()=>{ arc.classList.remove('rocking'); if (done) done(); });
    });
  });
}
function hopAlongPath(targetId, done){
  const from = PATH_IDS.indexOf(komaAt), to = PATH_IDS.indexOf(targetId);
  if (from < 0 || to < 0 || from === to){ if (done) done(); return; }
  const step = to > from ? 1 : -1;
  let i = from;
  (function next(){
    i += step;
    hop(PATH_IDS[i], ()=>{
      if (i === to){ if (done) done(); }
      else after(60, next);
    });
  })();
}

/* ================= camera — the whole living print stays framed =================
   Desktop frames EVERY visible impression (printed, sealed, ghost, fog) so the
   board fills the canvas — koma + next rung are always inside that set.
   Mobile tightens to koma + next rung so the action stays readable. */
function isMobile(){ return innerWidth < 720; }
function frame(instant){
  const a = byId[komaAt] || byId.river;
  let list;
  if (isMobile()){
    list = [a];
    const nid = 'r' + S.next;
    if (byId[nid] && sqState[nid] && sqState[nid] !== 'hidden') list.push(byId[nid]);
  } else {
    list = SQUARES.concat(DETOURS).filter(s => sqState[s.id] && sqState[s.id] !== 'hidden');
    if (list.indexOf(a) < 0) list.push(a);
  }
  const pad = isMobile() ? 90 : 60;
  let minx = Infinity, maxx = -Infinity, miny = Infinity, maxy = -Infinity;
  list.forEach(s=>{
    minx = Math.min(minx, s.x - s.w/2); maxx = Math.max(maxx, s.x + s.w/2);
    miny = Math.min(miny, s.y - s.h/2); maxy = Math.max(maxy, s.y + s.h/2);
  });
  minx -= pad; maxx += pad; miny -= pad; maxy += pad;
  const availW = innerWidth - (isMobile()?0:272);
  const availH = innerHeight - 64 - (isMobile()?92:0);
  const bw = maxx-minx, bh = maxy-miny;
  let sc = Math.min(availW/bw, availH/bh);
  sc = Math.max(.32, Math.min(1.15, sc));
  cam = {x:(availW-bw*sc)/2 - minx*sc, y:(availH-bh*sc)/2 - miny*sc, s:sc};
  const c = $('#camera');
  if (instant || RM){
    c.classList.add('no-ease');
    c.style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.s})`;
    void c.getBoundingClientRect();
    c.classList.remove('no-ease');
  } else {
    c.classList.remove('no-ease');
    c.style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.s})`;
  }
}

/* ================= tick — the quiet loop ================= */
function tick(){
  if (!S || S.busy || fightOpen()) return;
  if (S.preset === 'minute-one'){ minuteTick(); return; }
  const target = S.wander[S.wanderIdx % S.wander.length];
  S.wanderIdx++;
  if (target !== komaAt){
    S.busy = true;
    hopAlongPath(target, ()=>{ S.busy = false; frame(); doDeed(target); });
  } else doDeed(target);
}
function doDeed(sq){

/* ================= fight — the detour panel ================= */
const STANCES = [
  ['下段','×0.8 atk · ×0.85 taken'],
  ['中段','balanced'],
  ['上段','×1.35 atk · ×1.15 taken']
];
function fightOpen(){ return $('#fight').classList.contains('open'); }
function buildStances(){
  const box = $('#stances');
  STANCES.forEach(st=>{
    const b = document.createElement('button');
    b.className = 'stance'; b.type = 'button';

      + '<circle class="enso" cx="32" cy="32" r="27" transform="rotate(-80 32 32)"/></svg>'
      + '<span class="s-k">' + st[0] + '</span>'
      + '<span class="s-sub">' + st[1] + '</span>';

function fight(){
  if (!S || fightOpen() || S.busy) return;
  S.busy = true;
  settleFn = ()=>{ $('#fight').classList.remove('open'); };  // unpicked: fold away
  const hp0 = S.hp == null ? 58 : S.hp;
  $('#f-hp').textContent = hp0;
  $('#f-weapon').textContent = S.weapon
    ? S.weapon.k + ' · atk ' + S.weapon.atk + ' · ' + S.weapon.state
    : '天秤棒 · atk 3 · worn';

}
function pickStance(btn){
  if (btn.disabled) return;
  btn.classList.add('picked');
  document.querySelectorAll('.stance').forEach(b=>b.disabled = true);
  $('#exchange').classList.add('on');
  const hp0 = S.hp == null ? 58 : S.hp;
  const dmg = Math.round(17 * (S.hpMax || 58) / 58);
  const beats = [Math.round(dmg*.35), Math.round(dmg*.35), 0];
  beats[2] = dmg - beats[0] - beats[1];
  const hp1 = Math.max(1, hp0 - dmg);
  const line = COPY.monkeyWin(hp0, hp1);
  let resolved = false;
  const resolveFight = ()=>{                       // the beat's persistent end
    if (resolved) return; resolved = true;
    $('#fight').classList.remove('open');
    if (S.hp != null){ S.hp = hp1; countUp($('#n-hp'), hp1, 500); renderHP(); }
    applyGain({coin:3, sinew:1});
    if (S.weapon){
      S.weapon.wear = Math.max(0, S.weapon.wear - 2);
      countUp($('#n-wear'), S.weapon.wear, 300);
    }
    if (S.quest && S.quest.done < S.quest.of){
      S.quest.done++;
      const q = $('#q-count');
      if (q){ q.textContent = S.quest.done + ' / ' + S.quest.of;
              q.classList.remove('dip'); q.classList.add('dip'); }
    }
    log(line);
    S.busy = false; settleFn = null;
  };
  settleFn = resolveFight;
  let hp = hp0;
  [70, 220, 370].forEach((x,i)=>{
    after(300 + i*450, ()=>{
      const ln = E('line', {class:'slash', x1:x, y1:66, x2:x+80, y2:14}, $('#ex-svg'));
      if (!RM){
        const len = Math.hypot(80,52);
        ln.style.strokeDasharray = len; ln.style.strokeDashoffset = len;
        ln.style.transition = 'stroke-dashoffset .22s ease-out';
        requestAnimationFrame(()=>requestAnimationFrame(()=>{ ln.style.strokeDashoffset='0'; }));
      }
      hp -= beats[i];
      countUp($('#f-hp'), hp, 300);
    });
  });
  after(300 + 3*450 + 280, ()=>{
    const r = $('#f-result'); r.textContent = line; r.classList.add('on');
    after(2000, resolveFight);
  });
}

function rungUp(){
  if (!S || S.busy || fightOpen()) return;

  if (!RUNGS[rn]){ log(ASCEND, {milestone:true}); return; }
  S.busy = true;

  const sq = byId['r'+rn];
  countUp($('#meter-n'), RUNGS[rn].need, 450);
  let n = S.strokesShown;
  (function fill(){ if (n < 50){ drawStroke(sq, n); n++; after(RM?0:26, fill); } })();
  S.meter = RUNGS[rn].need; S.strokesShown = 50;
  after(1100, ()=>hopAlongPath('r'+rn, ()=>ceremony(rn, fin)));
}
function ceremony(rn, fin){
  fin = fin || {};
  const id = 'r'+rn, g = $('#sq-'+id);
  after(150, ()=>{                                   // title stamps in vermilion
    const t = g.querySelector('.title');
    t.style.fill = 'var(--shu)';

    t.classList.add('stamping');
  });
  after(430, ()=>{                                   // the seal + the rank chip

  });
  after(720, ()=>{                                   // ceremony text prints
    cerePrint(rn);

    fin.cere = true;
  });
  after(1600, ()=>{
    S.rung = rn; S.next = rn + 1; S.meter = 0; S.strokesShown = 0;
    setRank();
    const nid = 'r' + S.next;
    if (byId[nid]){
      impress(nid, 320);                             // the world widens
      after(1150, setNextRungFace);
    }

  });
}
/* force-resolve: everything the beat would have left behind, applied at once */
function finishRung(rn, fin){
  const id = 'r'+rn, sq = byId[id], g = $('#sq-'+id);
  sqState[id] = 'sealed';
  buildTally(sq); setStrokes(sq, 50);
  g.querySelector('.title').style.fill = 'var(--shu)';
  if (!fin.cere){ cerePrint(rn); log(RUNGS[rn].cere, {milestone:true}); fin.cere = true; }
  S.rung = rn; S.next = rn + 1; S.meter = 0; S.strokesShown = 0;
  setRank();
  const nid = 'r' + S.next;
  if (byId[nid] && sqState[nid] !== 'sealed') sqState[nid] = 'printed';
  syncSquares();
  placeKoma(id, false);

}

/* ================= beat settling — beats never block each other ================
   Any dev trigger force-resolves the in-flight beat to its FINAL persistent
   state (rank chip advanced, koku banked, season turned) before the next one
   plays. syncSquares re-asserts every square's settled look from sqState. */
function syncSquares(){
  for (const id in sqState){
    const st = sqState[id];
    if (st !== 'printed' && st !== 'sealed') continue;
    const g = $('#sq-'+id); if (!g) continue;
    g.classList.remove('ghost','ghost2','fog');
    g.classList.add('on');
    const cb = g.querySelector('.clrblk');
    if (cb){ cb.classList.remove('misreg'); cb.style.opacity = ''; }
    const seal = g.querySelector('.seal');
    if (seal) seal.classList.toggle('hidden', st !== 'sealed');
  }
  updateConns();
  if (S && RUNGS[S.next] && sqState['r'+S.next] === 'printed') setNextRungFace();
}
function forceSettle(){
  const f = settleFn; settleFn = null;
  clearTimers();
  if (f) f();
  if (S) S.busy = false;
  const arc = document.querySelector('#koma .arc');
  if (arc) arc.classList.remove('hopping','squatting','rocking');
  syncSquares();
}

/* ================= reveal — printed into existence ================= */
function reveal(){
  if (!S) return;
  const st = S.revealStep || 0;
  if (st === 0 && sqState.okuyama !== 'printed'){
    impress('okuyama', 0);
    after(520, ()=>setSquareState('boar','ghost'));
    log(COPY.boarBlurb, {dim:true});
    S.revealStep = 1; return;
  }
  if (st <= 1 && sqState.wolf !== 'printed'){
    impress('wolf', 0);
    log(COPY.wolfBlurb, {dim:true});
    S.revealStep = 2; return;
  }
  log(COPY.dream, {dim:true});
  S.revealStep = 3;
}

/* ================= presets ================= */
function openingPull(){
  if (RM) return;
  const availW = innerWidth - (isMobile()?0:272);
  const availH = innerHeight - 64 - (isMobile()?92:0);
  const cx = availW/2, cy = availH/2, k = .82;
  const x = cx - (cx - cam.x) * k, y = cy - (cy - cam.y) * k;
  const c = $('#camera');
  c.classList.add('no-ease');
  c.style.transform = `translate(${x}px,${y}px) scale(${cam.s * k})`;
  void c.getBoundingClientRect();
  c.classList.remove('no-ease');
  after(350, ()=>{ c.style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.s})`; });
}
function applyPreset(name){
  clearTimers();
  settleFn = null;                 // a stale beat must never fire into the new S
  const keepAuto = S ? S.auto : true;
  S = JSON.parse(JSON.stringify(PRESETS[name]));
  S.preset = name; S.auto = keepAuto; S.busy = false;
  S.wanderIdx = 0; S.m1 = 0;
  S.carriedVisible = name !== 'minute-one';
  S.dateVisible = name !== 'minute-one';
  S.revealStep = name === 'hour-ten' ? 2 : 0;
  document.body.classList.toggle('minute-one', name === 'minute-one');
  document.body.classList.remove('judging');
  $('#dawn').style.opacity = '';
  $('#kiwame').classList.remove('show');
  $('#fight').classList.remove('open');
  document.querySelectorAll('.cere-fo').forEach(n=>n.remove());
  document.querySelectorAll('.sq .title').forEach(t=>{ t.style.fill=''; t.classList.remove('stamping'); });
  // square states
  const sealedSet = {};
  S.printed.forEach(id=>{
    const sq = byId[id];
    sealedSet[id] = (sq.rung && sq.rung <= S.rung) ? 'sealed' : 'printed';
  });
  PATH_IDS.concat(DETOURS.map(d=>d.id)).forEach(id=>setSquareState(id,'hidden'));
  S.ghosts.forEach(id=>setSquareState(id,'ghost'));
  (S.ghost2 || []).forEach(id=>setSquareState(id,'ghost2'));
  for (const id in S.detours){
    if (S.detours[id] === 'fog') setSquareState(id,'fog');
    else if (S.detours[id] === 'printed') sealedSet[id] = 'printed';
  }
  SQUARES.filter(s=>s.rung).forEach(s=>{
    const g = $('#tally-'+s.id); if (g) g.textContent = '';
    const m = $('#meter-'+s.id); if (m){ m.classList.add('hidden'); m.textContent=''; }
    if (sealedSet[s.id] === 'sealed'){ buildTally(s); setStrokes(s, 50); }  // the lived print
  });
  $('#rec-scroll').textContent = '';
  S.recorder.forEach(e=>log(e.t, e));
  renderColophon();
  placeKoma(S.koma, false);
  $('#river-verb').classList.toggle('hidden', name !== 'minute-one');
  // print-in replay — the sheet prints itself, impression by impression
  const seq = PATH_IDS.filter(id=>sealedSet[id])
    .concat(DETOURS.map(d=>d.id).filter(id=>sealedSet[id]));
  seq.forEach(id=>{ sqState[id] = sealedSet[id]; });   // camera knows the plan
  updateConns();
  seq.forEach((id,i)=>impress(id, 140 + i*95, sealedSet[id] === 'sealed'));
  after(140 + seq.length*95 + 160, ()=>{
    if (RUNGS[S.next] && sealedSet['r'+S.next]) setNextRungFace();
  });
  S.strokesShown = strokesFor();
  frame(true);
  openingPull();
}
/* de-dupe the live meter tspan id before rebuilding */
const _setNextRungFace = setNextRungFace;
setNextRungFace = function(){
  document.querySelectorAll('#board [id="meter-n"]').forEach(n=>n.removeAttribute('id'));
  _setNextRungFace();
};

/* ================= wiring ================= */
function syncAutoBtn(){
  const b = document.querySelector('[data-dev="auto"]');
  b.classList.toggle('on', !!(S && S.auto));
  b.textContent = (S && S.auto) ? 'auto ●' : 'auto ○';
}
document.querySelectorAll('#dev [data-dev]').forEach(b=>{
  b.addEventListener('click', ()=>{
    const a = b.dataset.dev;
    /* beats never block each other — a new trigger force-resolves whatever
       beat is in flight (to its final PERSISTENT state) before it runs */
    if (a !== 'auto' && S && (S.busy || fightOpen())) forceSettle();
    if (a === 'tick') tick();
    else if (a === 'fight') fight();
    else if (a === 'rung') rungUp();
    else if (a === 'judge') judge();
    else if (a === 'reveal') reveal();
    else if (a === 'season') advanceSeason();
    else if (a === 'auto'){ S.auto = !S.auto; syncAutoBtn(); }
    else if (a === 'reset') applyPreset('hour-three');
    else if (a === 'stage-1min') applyPreset('minute-one');
    else if (a === 'stage-3hr') applyPreset('hour-three');
    else if (a === 'stage-10hr') applyPreset('hour-ten');
  });
});
/* drag to pan back over the finished print; dblclick reframes */
(function(){
  const vp = $('#viewport');
  let drag = null;
  vp.addEventListener('pointerdown', e=>{
    if (e.button !== 0) return;
    drag = {sx:e.clientX, sy:e.clientY, cx:cam.x, cy:cam.y};
    vp.classList.add('dragging');
    $('#camera').classList.add('no-ease');
    vp.setPointerCapture(e.pointerId);
  });
  vp.addEventListener('pointermove', e=>{
    if (!drag) return;
    cam.x = drag.cx + e.clientX - drag.sx;
    cam.y = drag.cy + e.clientY - drag.sy;
    $('#camera').style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.s})`;
  });
  vp.addEventListener('pointerup', ()=>{
    drag = null;
    vp.classList.remove('dragging');
    $('#camera').classList.remove('no-ease');
  });
  vp.addEventListener('dblclick', ()=>frame());
})();
window.addEventListener('resize', ()=>frame(true));

/* ================= init ================= */
buildConns();
SQUARES.forEach(buildSquare);
DETOURS.forEach(buildDetour);
buildMarks();
buildStances();
(function(){
  const rg = $('#sq-river');
  const v = E('text', {id:'river-verb', class:'lbl hidden', x:byId.river.w/2,
    y:byId.river.h + 26, 'text-anchor':'middle'}, rg);
  v.textContent = '— rake the spilled rice —';
  v.style.cursor = 'pointer';
  v.addEventListener('click', e=>{ e.stopPropagation(); tick(); });
})();
applyPreset('hour-three');
syncAutoBtn();
setInterval(()=>{ if (S && S.auto && !S.busy && !fightOpen()) tick(); }, 2500);
after(1200, tick);   // alive within two seconds
</script>
