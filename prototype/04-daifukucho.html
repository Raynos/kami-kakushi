<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kami-kakushi — Daifukuchō 大福帳</title>
<style>
:root{
  --cedar:#6B4A2E; --cedar-dk:#54371F; --boxwood:#A57B4B;
  --washi:#E8DFC8; --washi-dk:#DCD1B4; --washi-sh:#CEC2A2;
  --sumi:#2B241C; --sumi-soft:#4C4133; --faint:#7A6C57; --pencil:#6E6250;
  --shu:#B03A2E; --roiro:#3A2F28; --roiro-dk:#241C16; --karashi:#C9A227; --brass:#8F6F35;
  --f-disp:"Toppan Bunkyu Midashi Mincho","Toppan Bunkyu Mincho","Hiragino Mincho ProN","Yu Mincho",serif;
  --f-min:"Hiragino Mincho ProN","Yu Mincho","Hoefler Text",serif;
  --f-klee:"Klee","Hiragino Maru Gothic ProN","Hiragino Mincho ProN",serif;
  --f-lat:"Iowan Old Style",Baskerville,"Hoefler Text",Palatino,Georgia,serif;
  --f-mono:ui-monospace,"SF Mono",Menlo,monospace;
  --s0:11px; --s1:13px; --s2:15px; --s3:22px; --s4:34px; --s5:44px;
  --tex-wood:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='480' height='240'><filter id='g'><feTurbulence type='fractalNoise' baseFrequency='0.009 0.13' numOctaves='4' seed='11'/><feColorMatrix values='0 0 0 0 0.07 0 0 0 0 0.045 0 0 0 0 0.02 0 0 0 0.55 0'/></filter><rect width='480' height='240' filter='url(%23g)'/></svg>");
  --tex-washi:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='p'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' seed='4'/><feColorMatrix values='0 0 0 0 0.26 0 0 0 0 0.22 0 0 0 0 0.15 0 0 0 0.12 0'/></filter><rect width='240' height='240' filter='url(%23p)'/></svg>");
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background-color:var(--cedar);background-image:var(--tex-wood);color:var(--sumi);font-family:var(--f-min);font-size:var(--s1);overflow:hidden}
.num{font-family:var(--f-lat);font-variant-numeric:tabular-nums lining-nums}
button{font:inherit;color:inherit;background:none;border:none;padding:0;cursor:pointer;text-align:inherit}
:focus-visible{outline:2px dashed var(--karashi);outline-offset:2px}
h1,h2,h3{margin:0;font-weight:normal}
#light{position:fixed;inset:-4%;pointer-events:none;z-index:40;background:radial-gradient(120% 90% at 12% 6%,rgba(255,241,214,.13),rgba(30,22,14,.22) 72%);animation:drift 80s ease-in-out infinite alternate}
@keyframes drift{to{transform:translate(-1.2%,-.8%)}}
body[data-season="summer"] #light{background:radial-gradient(130% 95% at 16% 4%,rgba(255,236,190,.20),rgba(30,22,12,.14) 75%)}
body[data-season="autumn"] #light{background:radial-gradient(120% 90% at 12% 8%,rgba(255,214,150,.18),rgba(40,24,10,.26) 72%)}
body[data-season="winter"] #light{background:radial-gradient(120% 90% at 12% 8%,rgba(235,238,240,.16),rgba(18,16,14,.30) 72%)}
body[data-stage="minute-one"] #light{background:radial-gradient(110% 85% at 18% 0%,rgba(200,204,208,.05),rgba(8,6,4,.62) 70%)}
#desk{position:relative;height:100vh;display:grid;grid-template-columns:222px minmax(0,1fr) 282px;gap:20px;padding:24px 26px}
.col{display:flex;flex-direction:column;gap:14px;min-height:0}
#colC{position:relative}
.paper{background-color:var(--washi);background-image:var(--tex-washi);border:1px solid rgba(43,36,28,.55)}
.shade{background-color:var(--washi-dk)}
.klee{font-family:var(--f-klee);color:var(--pencil)}
/* ---- left column ---- */
#cal{padding:10px 12px;display:flex;gap:10px;justify-content:space-between;transition:opacity .2s;min-height:118px}
#cal .vdate{writing-mode:vertical-rl;font-family:var(--f-disp);font-size:var(--s3);letter-spacing:.12em;line-height:1.25}
#cal .meta{display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;font-size:var(--s0);color:var(--sumi-soft)}
#quest{padding:12px 12px 10px}
#quest h3{font-family:var(--f-disp);font-size:var(--s2);margin-bottom:2px}
#quest .rw{font-size:var(--s0);color:var(--faint);margin-bottom:6px}
#quest ul{list-style:none;margin:0;padding:0;font-size:var(--s0)}
#quest li{display:flex;gap:6px;align-items:center;padding:1px 0}
#quest li::before{content:"";width:9px;height:9px;border:1.4px solid var(--sumi-soft);border-radius:50%;flex:none}
#quest li.done::before{background:var(--sumi-soft)}
#quest li.done{color:var(--faint)}
#quest .tie{position:absolute;top:-5px;left:14px;right:14px;height:8px;border-top:1.5px solid var(--sumi-soft);opacity:.5}
#quest{position:relative}
#map{padding:8px}
#map svg{display:block;width:100%;height:auto}
#map .note{font-size:var(--s0);padding:3px 4px 1px}
.mapline{fill:none;stroke:var(--sumi-soft);stroke-width:1.3;stroke-linecap:round;stroke-dasharray:3 4;opacity:.5}
.node circle{fill:var(--washi);stroke:var(--sumi-soft);stroke-width:1.4}
.node text{font-size:9px;font-family:var(--f-min);fill:var(--sumi)}
.node.fog{opacity:.4;filter:blur(1.1px)}
.node[hidden]{display:none}
#dot{transition:transform .6s ease-in-out}
#besti{padding:10px 12px}
#besti[hidden]{display:none}
#besti h3{font-family:var(--f-disp);font-size:var(--s2);margin-bottom:6px}
#besti .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.foe{display:flex;flex-direction:column;align-items:center;gap:1px;font-size:var(--s0)}
.foe svg{width:38px;height:29px}
.foe .stroke{fill:none;stroke:var(--sumi);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
.foe.fog svg{filter:blur(2px);opacity:.35}
.foe.fog .nm,.foe.unknown .nm{color:var(--faint)}
.foe.unknown svg{opacity:.22}
#besti.placed{animation:placeIn .5s cubic-bezier(.2,.9,.3,1)}
@keyframes placeIn{from{transform:translateX(150px) rotate(4deg)}}
/* ---- book ---- */
#book{position:relative;flex:1;min-height:0;display:grid;grid-template-columns:1fr 30px 1fr;border:1px solid rgba(30,22,14,.7);background:var(--washi-dk);transition:transform .6s ease-in-out}
#book.turning{transform:scale(1.012)}
#foreedge{position:absolute;left:-8px;top:8px;bottom:8px;width:6px;background:repeating-linear-gradient(90deg,var(--washi) 0 1px,var(--washi-sh) 1px 2px);border:1px solid rgba(43,36,28,.35);border-right:none}
.page{position:relative;padding:14px 16px;min-height:0;overflow:hidden;background-color:var(--washi);background-image:var(--tex-washi);display:flex;flex-direction:column}
.vhead{font-family:var(--f-lat);font-size:var(--s0);color:var(--faint);letter-spacing:.24em;text-transform:uppercase;margin-bottom:8px;flex:none;position:relative;z-index:1}
/* verso page furniture — faint bengara ledger ruling, measured from the right (vertical-writing order) */
#verso::before{content:"";position:absolute;top:36px;left:16px;right:16px;bottom:12px;pointer-events:none;background:repeating-linear-gradient(270deg,transparent 0 43px,rgba(146,74,54,.14) 43px 44px)}
#verso::after{content:"";position:absolute;top:33px;left:16px;right:16px;height:1px;pointer-events:none;background:rgba(146,74,54,.26)}
.pgno{position:absolute;left:16px;bottom:3px;font-size:var(--s0);letter-spacing:.1em;opacity:.65}
#hankoGhost{position:absolute;right:64px;bottom:54px;width:56px;height:56px;border:2px solid var(--shu);border-radius:3px;color:var(--shu);font-family:var(--f-disp);font-size:var(--s2);line-height:1.1;display:grid;place-items:center;text-align:center;transform:rotate(-4deg);opacity:.07;filter:blur(.5px);pointer-events:none}
#gutter{background:var(--washi-sh);border-left:1px solid rgba(43,36,28,.25);border-right:1px solid rgba(43,36,28,.25);display:flex;justify-content:center;padding-top:128px}
#skills{writing-mode:vertical-rl;font-family:var(--f-klee);color:var(--pencil);font-size:var(--s0);letter-spacing:.14em;line-height:1.1}
#chit{position:absolute;left:50%;top:24px;transform:translateX(-82%) rotate(2.5deg);width:122px;padding:6px 9px 7px;font-size:var(--s0);z-index:5;transition:transform .18s}
#chit:hover{transform:translateX(-82%) rotate(2.5deg) translateY(-4px)}
#chit .who{font-family:var(--f-klee);color:var(--pencil);margin-bottom:1px}
#chit .r{display:flex;justify-content:space-between;gap:6px}
#chit.hurt::after{content:"";position:absolute;top:-1px;right:-1px;width:0;height:0;border-left:15px solid transparent;border-top:15px solid var(--washi-sh);filter:brightness(.82)}
#verso .spread{display:grid;grid-template-columns:1fr 44px;gap:10px;flex:1;min-height:0}
.rungcol{display:flex;flex-direction:column;gap:14px;min-height:0}
.rname{font-family:var(--f-disp);font-size:var(--s3);line-height:1.15}
.rname .en{display:block;font-family:var(--f-lat);font-size:var(--s0);color:var(--faint);letter-spacing:.08em;margin-top:2px}
.rnow{display:flex;gap:8px;align-items:flex-start}
.rnext .rname{color:var(--faint)}
.rnext .lead{font-size:var(--s0);color:var(--faint);margin-bottom:2px}
.sealmini{width:20px;height:20px;background:var(--shu);color:var(--washi);font-size:11px;font-family:var(--f-disp);display:grid;place-items:center;border-radius:2px;transform:rotate(-3deg);flex:none;margin-top:4px}
#pillars{margin-top:auto;font-size:var(--s0)}
.mwrap{display:flex;flex-direction:column;align-items:center;gap:6px;min-height:0}
.mlab{font-family:var(--f-klee);color:var(--pencil);font-size:var(--s0);opacity:.85}
.mtrack{position:relative;width:16px;flex:1;border:1px solid rgba(146,74,54,.4);background:repeating-linear-gradient(0deg,transparent 0 17px,rgba(146,74,54,.13) 17px 18px)}
.mfill{position:absolute;left:1px;right:1px;bottom:1px;background:var(--sumi);opacity:.82;transition:height .4s ease-out}
.mnum{font-size:var(--s0);color:var(--sumi-soft);text-align:center;white-space:nowrap}
#verso.ceremony .big{font-family:var(--f-disp);font-size:var(--s5);line-height:1.1;margin:18px 0 4px;letter-spacing:.04em}
#verso.ceremony .en{font-family:var(--f-lat);font-size:var(--s1);color:var(--faint);letter-spacing:.12em}
#houseSeal{width:58px;height:58px;background:var(--shu);color:var(--washi);font-family:var(--f-disp);display:grid;place-items:center;line-height:1.05;font-size:var(--s2);border-radius:3px;transform:rotate(2deg);letter-spacing:1px;margin-top:26px;text-align:center}
#houseSeal[hidden]{display:none}
.stampin{animation:stampin .16s cubic-bezier(.2,1.5,.4,1)}
@keyframes stampin{from{transform:scale(1.7) rotate(-8deg);opacity:0}}
#flap{position:absolute;top:0;bottom:0;left:calc(50% + 15px);right:0;background-color:var(--washi);background-image:var(--tex-washi);border-left:1px solid rgba(43,36,28,.4);transform-origin:left center;transform:scaleX(0);pointer-events:none;z-index:6}
#flap.go{animation:flap .6s ease-in-out}
@keyframes flap{0%{transform:scaleX(0)}45%{transform:scaleX(1)}100%{transform:scaleX(0)}}
#log{flex:1;overflow-y:auto;overflow-x:hidden;padding-right:6px;scrollbar-width:thin;scrollbar-color:var(--washi-sh) transparent}
.le{font-size:var(--s1);line-height:1.6;margin:0 0 7px;clip-path:inset(0 100% 0 0);animation:brush var(--d,600ms) linear forwards}
@keyframes brush{to{clip-path:inset(0 -2% 0 0)}}
.le.seed{animation:none;clip-path:none}
.le.system{font-size:var(--s0);color:var(--faint)}
.le.dream{font-family:var(--f-klee);color:var(--pencil)}
.le.milestone{font-family:var(--f-disp);font-size:var(--s2);line-height:1.55;margin:10px 0}
.audit{margin:10px 0;padding:2px 0}
.audit .rule{height:2px;background:var(--shu);transform:scaleX(0);transform-origin:left;animation:ruleIn .24s ease-out forwards}
.audit .rule.r2{animation-delay:.12s}
.audit .atext{color:var(--shu);font-family:var(--f-disp);font-size:var(--s2);padding:7px 2px;letter-spacing:.06em}
.audit .asub{font-family:var(--f-klee);color:var(--pencil);font-size:var(--s0);padding:0 2px 6px}
@keyframes ruleIn{to{transform:scaleX(1)}}
/* ---- tray ---- */
#tray{height:198px;flex:none;display:grid;grid-template-columns:auto minmax(0,1fr) 54px;gap:16px;align-items:stretch}
#stamps{display:grid;grid-template-columns:repeat(3,62px);grid-auto-rows:62px;gap:10px;align-content:start}
.stamp{position:relative;background-color:var(--boxwood);background-image:var(--tex-wood);border:1px solid rgba(28,18,8,.65);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:transform .09s ease-in,opacity .2s,filter .2s}
.stamp .k{font-family:var(--f-disp);font-size:26px;line-height:1}
.stamp .sub{font-size:9px;font-family:var(--f-lat);color:rgba(43,36,28,.78);letter-spacing:.02em}
.stamp.press{transform:scale(.96) translateY(1.5px)}
.stamp.far{opacity:.5;filter:saturate(.55)}
.stamp[hidden]{display:none}
body[data-season="autumn"] .stamp[data-v="farm"]::after{content:"×1.3";position:absolute;top:2px;right:3px;font-family:var(--f-klee);font-size:9px;color:var(--brass)}
#slipfield{position:relative;min-width:0}
.slip{position:absolute;width:122px;margin-left:-61px;padding:7px 10px 9px;font-size:var(--s0);line-height:1.4;transform:rotate(var(--r,0deg));animation:slipIn .24s cubic-bezier(.2,.9,.3,1)}
.slip .big{font-family:var(--f-disp);font-size:var(--s2);display:block}
.slip .sub{font-family:var(--f-lat);color:var(--sumi-soft)}
.slip.walk{width:158px;margin-left:-79px;background-color:var(--washi-dk);font-family:var(--f-klee)}
.slip.walk .big{font-family:var(--f-klee);color:var(--pencil)}
.slip.walk .sub{font-family:var(--f-klee);color:var(--pencil)}
@keyframes slipIn{from{transform:translateX(40px) rotate(var(--r,0deg))}}
.slip.tospike{transition:transform .3s ease-in,opacity .3s;opacity:0}
/* harigata — the day-end receipt spike: brass pin on a lacquer foot */
#spikezone{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px;padding-bottom:2px}
#spike{position:relative;width:46px;height:80px;flex:none}
#spikepin{position:absolute;left:50%;bottom:9px;width:2px;height:62px;margin-left:-1px;background:linear-gradient(180deg,#EBDCAC,var(--brass) 26%,#6E5527)}
#spikepin::before{content:"";position:absolute;top:-6px;left:-2.5px;border-left:3.5px solid transparent;border-right:3.5px solid transparent;border-bottom:7px solid #EBDCAC}
#spikepapers{position:absolute;left:50%;bottom:12px;width:0}
#spikepapers i{position:absolute;left:-17px;width:34px;height:8px;background-color:var(--washi);background-image:var(--tex-washi);border:1px solid rgba(43,36,28,.5)}
#spikebase{position:absolute;left:50%;bottom:0;width:42px;height:13px;margin-left:-21px;border-radius:50%;background:radial-gradient(ellipse at 38% 28%,#4C3C2B,var(--roiro) 55%,#1D130C);border:1px solid #150E08;box-shadow:inset 0 1px 0 rgba(226,185,124,.22)}
#spikecount{font-size:var(--s0);color:#E0D2AF;min-height:14px}
/* ---- right column ---- */
#soroban,#kura{background-color:var(--roiro);background-image:linear-gradient(158deg,rgba(226,185,124,.11),rgba(226,185,124,.02) 42%,rgba(12,7,3,.20)),var(--tex-wood);border:1px solid #1C130C;box-shadow:inset 0 1px 0 rgba(226,185,124,.20),inset 1px 0 0 rgba(226,185,124,.07),inset 0 -1px 0 rgba(12,7,3,.35),inset -1px 0 0 rgba(12,7,3,.22)}
#soroban{padding:10px 12px;flex:none}
#soroban .shead{font-family:var(--f-lat);font-size:var(--s0);color:#B8A986;letter-spacing:.22em;text-transform:uppercase;margin-bottom:6px;transition:opacity .2s}
.rod{display:grid;grid-template-columns:18px 1fr 46px;gap:8px;align-items:center;height:30px}
.rod .lab{font-family:var(--f-disp);font-size:var(--s2);color:#D9CCA8;text-align:center;transition:opacity .2s}
.rtrack{position:relative;height:22px}
.rtrack::before{content:"";position:absolute;left:0;right:0;top:10px;height:2px;background:var(--brass);opacity:.8}
.rtrack::after{content:"";position:absolute;left:36px;top:0;bottom:0;width:3px;background:var(--roiro-dk)}
.bead{position:absolute;top:4px;width:14px;height:14px;border-radius:50%/46%;background:radial-gradient(circle at 35% 30%,#7A5C44,#4E392A 62%,#33251B);border:1px solid #201710;transition:transform .18s cubic-bezier(.34,1.35,.44,1)}
.bead.heaven{left:2px}
.bead.heaven.on{transform:translateX(22px)}
.bead.e0{left:74px}.bead.e1{left:91px}.bead.e2{left:108px}.bead.e3{left:125px}
.bead.earth.on{transform:translateX(-32px)}
#soroban.sweeping .bead{transition:transform .4s cubic-bezier(.55,0,.8,.5)}
.rodnum{color:#E6DABA;font-size:var(--s2);text-align:right;transition:opacity .2s}
#dropnote{margin-top:4px;font-size:var(--s0);color:#B8A986;text-align:right;font-family:var(--f-klee);min-height:14px}
body[data-stage="minute-one"] .rod .lab,body[data-stage="minute-one"] #soroban .shead{opacity:0}
#kura{padding:0 0 10px;flex:none}
#lid{height:26px;background:linear-gradient(180deg,#2F251C,#1F160E);border-bottom:1px solid #120C07;box-shadow:inset 0 1px 0 rgba(226,185,124,.16);display:flex;align-items:center;justify-content:space-between;padding:0 10px;transition:transform .3s ease;transform-origin:top center;color:#D9CCA8;font-size:var(--s0);letter-spacing:.18em}
#kura.open #lid{transform:translateY(-5px) scaleY(.55)}
#lid .fit{width:26px;height:8px;background:var(--brass);opacity:.7;border-radius:1px}
#vault{padding:8px 12px 0;color:#E6DABA;font-size:var(--s1);display:flex;flex-direction:column;gap:3px;max-height:0;opacity:0;overflow:hidden;transition:max-height .3s,opacity .3s}
#kura.open #vault{max-height:90px;opacity:1}
#vault .r{display:flex;justify-content:space-between}
#keyrow{display:flex;align-items:center;padding:8px 12px 0}
#key{display:flex;align-items:center;gap:7px;color:#D9CCA8;font-size:var(--s0);letter-spacing:.05em}
#key svg{display:block;flex:none}
#key.locked{opacity:.45;cursor:default}
#edge{margin-top:auto;margin-bottom:64px;display:flex;flex-direction:column;gap:12px;color:#E4D6B5}
#weapon{display:flex;flex-direction:column;gap:4px}
.wlabel{font-size:var(--s0);display:flex;justify-content:space-between;color:#E0D2AF}
#pole{height:10px;background:linear-gradient(180deg,#8A6A44,#5F452A);border:1px solid rgba(20,12,6,.6);border-radius:5px/50%}
#wear{display:flex;gap:3px}
.wt{width:10px;height:4px;background:#E0D2AF;opacity:.85}
.wt.spent{opacity:.22}
#inkstone{align-self:flex-end;width:64px;height:38px;background:radial-gradient(circle at 40% 35%,#413425,#261C12 70%);border-radius:45% 55% 50% 50%/55% 45% 55% 45%;border:1px solid #17100A;box-shadow:inset 0 1px 0 rgba(226,185,124,.14);transition:transform .18s}
#inkstone:hover{transform:translateY(-4px)}
body[data-stage="minute-one"] #colL,body[data-stage="minute-one"] #kura,body[data-stage="minute-one"] #edge,body[data-stage="minute-one"] #chit,body[data-stage="minute-one"] #spikezone,body[data-stage="minute-one"] #verso .spread,body[data-stage="minute-one"] #verso .vhead,body[data-stage="minute-one"] #verso .pgno,body[data-stage="minute-one"] #hankoGhost,body[data-stage="minute-one"] #foreedge{visibility:hidden}
/* ---- field report ---- */
#report{position:absolute;z-index:30;width:472px;left:50%;bottom:16px;margin-left:-236px;padding:14px 16px 16px;transform:rotate(-1.2deg);animation:repIn .24s cubic-bezier(.2,.9,.3,1)}
@keyframes repIn{from{transform:translateX(60px) rotate(-1.2deg)}}
#report.retire{transition:transform .45s ease-in,opacity .45s;transform:translate(360px,60px) rotate(6deg) scale(.4);opacity:0}
#report .head{display:flex;gap:12px;align-items:flex-start}
#report .head svg{width:64px;height:48px;flex:none}
#report .stroke{fill:none;stroke:var(--sumi);stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
#report .fname{font-family:var(--f-disp);font-size:var(--s3);line-height:1.1}
#report .fen{font-family:var(--f-lat);font-size:var(--s0);color:var(--faint)}
#report .blurb{font-size:var(--s0);color:var(--sumi-soft);margin-top:3px;max-width:310px}
#forecast{margin:8px 0 2px;font-size:var(--s1)}
.stances{display:flex;gap:10px;align-items:center;margin:6px 0 8px}
.stance{width:38px;height:38px;border:1.6px solid var(--sumi-soft);border-radius:50%;font-family:var(--f-disp);font-size:var(--s2);display:grid;place-items:center;color:var(--sumi-soft)}

#begin{margin-left:auto;width:46px;height:46px;background-color:var(--boxwood);background-image:var(--tex-wood);border:1px solid rgba(28,18,8,.65);font-family:var(--f-disp);font-size:var(--s3);transition:transform .09s;display:grid;place-items:center}
#begin.press{transform:scale(.96) translateY(1px)}
#exch{min-height:66px;font-family:var(--f-klee);color:var(--pencil);font-size:var(--s0);line-height:1.75}
.ex{opacity:0;transition:opacity .15s}
.ex.in{opacity:1}
.chop{position:absolute;right:20px;bottom:14px;width:62px;height:62px;border:3px solid var(--shu);border-radius:50%;color:var(--shu);display:grid;place-items:center;font-family:var(--f-disp);font-size:var(--s4);transform:rotate(-7deg);animation:chopIn .14s cubic-bezier(.2,1.6,.4,1)}
@keyframes chopIn{from{transform:scale(1.6) rotate(-15deg);opacity:0}}
@keyframes nudge{35%{transform:translateY(1.5px)}}
body.thump #desk{animation:nudge .12s ease-out}
/* ---- dev strip ---- */
#dev{position:fixed;right:10px;bottom:10px;z-index:60;background-color:#251C13;background-image:var(--tex-wood);border:1px solid #463622;box-shadow:inset 0 1px 0 rgba(226,185,124,.14);padding:6px 8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;max-width:308px;font-family:var(--f-mono);font-size:10px;color:#A8977E;opacity:.55;transition:opacity .15s}
#dev:hover{opacity:1}
#dev .lbl{width:100%;letter-spacing:.08em;color:#7A6A52}
#dev button{background:#33281B;border:1px solid #4C3B26;color:#C6B494;padding:2px 6px;font:inherit;cursor:pointer}
#dev button:hover{background:#3E3020}
#dev button[data-on="true"]{color:#E8DFC8;border-color:#8A6F45}
/* ---- responsive / reduced motion ---- */
@media (max-width:760px){
  body{overflow-y:auto;overflow-x:hidden}
  #desk{height:auto;grid-template-columns:1fr;padding:14px;gap:14px}
  #colC{order:1}#colR{order:2}#colL{order:3}
  #book{min-height:400px}
  /* keep the rung title legible — tuck the chit over the gutter, not the verso head */
  #chit{top:-6px;transform:translateX(-50%) rotate(2.5deg)}
  #chit:hover{transform:translateX(-50%) rotate(2.5deg) translateY(-4px)}
  #tray{height:auto;grid-template-columns:minmax(0,1fr) 54px;grid-template-rows:auto minmax(150px,auto);gap:12px 16px}
  #stamps{grid-column:1/-1;justify-content:center}
  #slipfield{min-height:150px}
  #soroban{position:sticky;bottom:0;z-index:35}
  #report{width:min(472px,92vw);margin-left:0;left:4vw}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s!important;transition-duration:.001s!important}
  #light{animation:none!important}
  .le{animation:rmdry .2s step-end forwards!important;clip-path:none!important;opacity:.45}
  @keyframes rmdry{to{opacity:1}}
}

  changed.forEach(([b,on],i)=>{b.style.transitionDelay=instant||RM?'0ms':(i*40)+'ms';b.classList.toggle('on',on);});
  setTimeout(()=>changed.forEach(([b])=>b.style.transitionDelay=''),T(500));
  if(instant){r.num.dataset.val=val;r.num.textContent=val;}else tweenNum(r.num,val);}
function renderSoroban(instant){for(const r of RODS)setRod(r.key,S.res[r.key],instant);
  $('#dropnote').textContent=S.hardwood>0?'堅木 hardwood ×'+S.hardwood:'';}
function renderCalendar(){$('#vdate').textContent='安永九年 '+SJP[SEASONS[S.seasonIdx]]+' ・ '+kanjiNum(S.day)+'日';
  tweenNum($('#kokuN'),S.koku);}
function renderQuest(){const q=S.quest,el=$('#quest');if(!q){el.style.visibility='hidden';return;}
  el.style.visibility='';$('#qtitle').textContent=q.title;
  const n=q.steps.filter(s=>s[1]).length;
  $('#qreward').innerHTML='高札 · <span class="num">'+q.reward+'</span> coin · <span class="num">'+n+'</span>/<span class="num">'+q.steps.length+'</span>';
  $('#qsteps').innerHTML=q.steps.map(s=>'<li class="'+(s[1]?'done':'')+'">'+s[0]+'</li>').join('');}
function renderMap(){$$('#mapnodes .node').forEach(g=>{const id=g.dataset.place;
    const known=S.known.includes(id);g.hidden=!known&&!(id==='deep');
    g.classList.toggle('fog',id==='deep'&&S.deepFog);
    if(id==='deep'&&!S.known.includes('deep')&&S.deepFog)g.hidden=false;});
  $$('#maplines .mapline').forEach(p=>{const[a,b]=p.dataset.edge.split('-');
    p.style.opacity=(S.known.includes(a)&&S.known.includes(b))?'':'0.15';});
  const pl=PLACES[S.pos];$('#dot').style.transform='translate('+pl.x+'px,'+pl.y+'px)';
  $('#estnote').textContent=S.estNote;}
function renderBesti(){const el=$('#besti');el.hidden=!S.bestiOn;
  $$('.foe',el).forEach(f=>{const st=S.besti[f.dataset.id];f.className='foe '+(st==='seen'?'':st);});}
function renderSkills(){$('#skills').textContent=S.skills?
  Object.entries(S.skills).map(([k,v])=>k+kanjiNum(v)).join('　'):'';}
function renderChit(){$('#hpN').textContent=S.hp;$('#hpM').textContent=S.hpMax;
  $('#satN').textContent=S.sat;$('#satM').textContent=S.satMax;
  $('#chit').classList.toggle('hurt',S.hp/S.hpMax<.5);}
function renderVerso(){const v=$('#verso');v.classList.remove('ceremony');const cur=RUNGS[S.rung],nxt=RUNGS[S.rung+1];
  const goal=nxt?nxt.goal:cur.goal;const pct=Math.min(100,S.meter/goal*100).toFixed(1);
  v.innerHTML='<div class="vhead">Standing 身分</div><div class="spread"><div class="rungcol">'+
   '<div class="rnow"><span class="sealmini">'+cur.jp[0]+'</span><div class="rname">'+cur.jp+'<span class="en">'+cur.en+'</span></div></div>'+
   (nxt?'<div class="rnext"><div class="lead">next — un-stamped</div><div class="rname">'+nxt.jp+'<span class="en">'+nxt.en+'</span></div></div>':'')+
   (S.pillars?'<div id="pillars" class="klee">'+S.pillars.jp+' '+S.pillars.en+' <span class="num">'+S.pillars.val+'</span> → '+S.pillars.band+'</div>':'')+
   '</div><div class="mwrap"><div class="mlab">功</div><div class="mtrack"><div class="mfill" id="mfill" style="height:'+pct+'%"></div></div>'+
   '<div class="mnum"><span class="num">'+S.meter+'</span><br>／<br><span class="num">'+goal+'</span></div></div></div>'+
   '<div id="hankoGhost" aria-hidden="true">黒沢<br>家</div>'+
   '<div class="pgno klee">'+kanjiNum(Math.max(1,S.pagesTurned))+'丁</div>';}
function renderStamps(){for(const v of VORDER){const b=stampEls[v];
  b.hidden=(S.stage==='minute-one'&&v!=='rake');
  const d=hops(S.pos,VERBS[v].place);b.classList.toggle('far',d>0);
  b.title=VERBS[v].label+(d>0?' — '+d+' tick walk':'');}}
function renderKura(){const k=$('#kura');if(S.pos!=='kura')k.classList.remove('open');
  $('#key').classList.toggle('locked',S.pos!=='kura');
  $('#bRice').textContent=S.banked.rice;$('#bCoin').textContent=S.banked.coin;}
function renderEdge(){const w=S.weapon;if(!w)return;
  $('#wname').textContent=w.jp+' · '+w.en;
  $('#wcond').innerHTML=w.cond+' <span class="num">'+w.dur+'</span>/<span class="num">'+w.max+'</span>';
  const full=Math.round(w.dur/w.max*8);
  $('#wear').innerHTML=Array.from({length:8},(_,i)=>'<span class="wt'+(i<full?'':' spent')+'"></span>').join('');}
function renderForeEdge(){$('#foreedge').style.width=Math.max(2,Math.min(18,S.pagesTurned))+'px';}
function renderAll(instant){renderCalendar();renderQuest();renderMap();renderBesti();renderSkills();
  renderChit();renderVerso();renderStamps();renderKura();renderEdge();renderForeEdge();renderSoroban(instant);}
/* ---------- log & slips ---------- */
function log(text,ch,seed){const d=document.createElement('div');d.className='le '+(ch||'')+(seed?' seed':'');
  if(!seed)d.style.setProperty('--d',Math.min(text.length*30,2600)+'ms');
  d.textContent=text;const host=$('#log');host.appendChild(d);
  while(host.children.length>40)host.firstChild.remove();host.scrollTop=host.scrollHeight;return d;}
function logAudit(from,to){const d=document.createElement('div');d.className='audit';
  d.innerHTML='<div class="rule"></div><div class="atext">石高改め　'+kanjiNum(from)+'石 → '+kanjiNum(to)+'石</div>'+
  '<div class="asub">the seasonal judge restates the koku standing</div><div class="rule r2"></div>';
  const host=$('#log');host.appendChild(d);host.scrollTop=host.scrollHeight;}
const SLIP_CAP=8;
function spearSlip(el){el.classList.add('tospike');
  el.style.transform='translate(200px,-4px) rotate(10deg) scale(.45)';
  setTimeout(()=>el.remove(),T(320));spikeCount++;
  if(spikeCount<=10){const p=document.createElement('i');
    p.style.bottom=((spikeCount-1)*4)+'px';
    p.style.transform='rotate('+(((spikeCount*47)%15)-7)+'deg)';
    $('#spikepapers').appendChild(p);}
  $('#spikecount').textContent='×'+spikeCount;}
function spawnSlip(big,sub,walk){const f=$('#slipfield');
  if(slips.length>=SLIP_CAP)spearSlip(slips.shift());
  const d=document.createElement('div');d.className='paper slip'+(walk?' walk':'');
  const i=slipSlot++;
  d.style.setProperty('--r',(((i*53)%13)-6)+'deg');
  d.style.left='calc(50% + '+(((i*37)%81)-40)+'px)';
  d.style.bottom=(8+((i*23)%26))+'px';
  d.style.zIndex=String(10+(i%200));
  d.innerHTML='<span class="big"></span><span class="sub"></span>';
  $('.big',d).textContent=big;$('.sub',d).textContent=sub;
  f.appendChild(d);slips.push(d);return d;}
function clearSlips(){slips.forEach(s=>s.remove());slips=[];slipSlot=0;spikeCount=0;
  $('#spikepapers').innerHTML='';$('#spikecount').textContent='';}
/* ---------- the loop ---------- */
function meterAdd(n){const nxt=RUNGS[S.rung+1];if(!nxt)return;S.meter+=n;
  const pct=Math.min(100,S.meter/nxt.goal*100).toFixed(1);
  const mf=$('#mfill');if(mf)mf.style.height=pct+'%';
  const mn=$('#verso .mnum .num');if(mn)mn.textContent=S.meter;
  if(S.meter>=nxt.goal&&!busy)setTimeout(beatRung,T(600));}
function applyYields(y){for(const k in y){S.res[k]+=y[k];setRod(k,S.res[k]);}}
function walkTo(place,cb){const n=hops(S.pos,place);
  spawnSlip(PLACES[place].jp+'へ','to '+PLACES[place].en+' — '+n+' tick'+(n>1?'s':''),true);
  S.pos=place;renderStamps();renderKura();
  const pl=PLACES[place];$('#dot').style.transform='translate('+pl.x+'px,'+pl.y+'px)';
  after(480,cb);}
function doDeed(key){if(busy)return;const v=VERBS[key];
  const run=()=>{const st=stampEls[key];st.classList.add('press');
    after(110,()=>st.classList.remove('press'));
    after(90,()=>spawnSlip(v.slip,v.sub));
    after(420,()=>applyYields(v.yields));
    after(580,()=>{log(v.line,key==='drill'?'system':'');meterAdd(2);});};
  if(S.pos!==v.place)walkTo(v.place,run);else run();}
function tick(){if(busy||document.hidden)return;
  doDeed(S.script[scriptIdx++%S.script.length]);}
/* ---------- demo beats ---------- */
function beatFight(){if(busy||$('#report'))return;busy=true;
  const rep=document.createElement('div');rep.id='report';rep.className='paper';
  rep.innerHTML='<div class="head"><svg viewBox="0 0 48 36">'+SKETCH.monkey+'</svg>'+
   '<div><div class="fname">猿 <span class="fen">Crop-raiding monkey · L1</span></div>'+
   '<div class="blurb">Bold and quick, a menace to the paddies — but the lightest of the threats.</div></div></div>'+
   '<div id="forecast" class="klee">勝目 二分九厘 — <span class="num">29</span>%</div>'+
   '<div class="stances"><button class="stance" data-st="gedan">下</button>'+
   '<button class="stance" data-st="chudan" aria-pressed="true">中</button>'+
   '<button class="stance" data-st="jodan">上</button>'+
   '<button id="begin" title="engage">討</button></div><div id="exch"></div>';
  $('#colC').appendChild(rep);
  if(S.besti.monkey!=='seen'){S.besti.monkey='seen';S.bestiOn=true;renderBesti();}
  $$('.stance',rep).forEach(b=>b.addEventListener('click',()=>{
    $$('.stance',rep).forEach(x=>x.setAttribute('aria-pressed','false'));
    b.setAttribute('aria-pressed','true');}));
  const ep=epoch;let begun=false,applied=false,h0=S.hp,h1=S.hp;
  const settle=()=>{if(!begun||applied)return;applied=true;
    S.hp=h1;renderChit();S.res.coin+=3;setRod('coin',S.res.coin);
    S.res.sinew+=1;setRod('sinew',S.res.sinew);
    log('You bring down the crop-raiding monkey. ✓ (HP '+h0+'→'+h1+' · +3 coin, +1 beast sinew)','');
    meterAdd(2);};
  finishBeat=()=>{settle();rep.remove();};
  const begin=()=>{if(begun||ep!==epoch)return;begun=true;
    const bb=$('#begin',rep);bb.classList.add('press');bb.disabled=true;
    h0=S.hp;h1=Math.max(1,Math.round(S.hp*41/58));
    const dmg=h0-h1,d1=Math.ceil(dmg/3),d2=Math.ceil((dmg-d1)/2),d3=dmg-d1-d2;
    const rows=[['一の合','猿 −7 · you −'+d1],['二の合','猿 −6 · you −'+d2],['三の合','猿 −7 · you −'+d3]];
    rows.forEach((r,i)=>after(200+i*550,()=>{const e=document.createElement('div');e.className='ex';
      e.textContent=r[0]+' ▸ '+r[1];$('#exch',rep).appendChild(e);
      requestAnimationFrame(()=>e.classList.add('in'));}));
    after(2050,()=>{const c=document.createElement('div');c.className='chop';c.textContent='勝';
      rep.appendChild(c);document.body.classList.add('thump');
      after(200,()=>document.body.classList.remove('thump'));});
    after(2550,settle);
    after(3350,()=>{rep.classList.add('retire');spawnSlip('勝 ・ 猿','+3 coin · +1 sinew');});
    after(3850,()=>{rep.remove();busy=false;finishBeat=null;});};
  $('#begin',rep).addEventListener('click',begin);
  after(2400,begin);}
function beatRung(){if(busy)return;
  if(S.rung>=7){log(ASCEND,'milestone');return;}busy=true;
  const v=$('#verso'),flap=$('#flap'),book=$('#book');
  const nxt=RUNGS[S.rung+1],copy=CEREMONY[S.rung+1];
  let logged=false;
  finishBeat=()=>{if(!logged){logged=true;log(copy,'milestone');}
    flap.classList.remove('go');book.classList.remove('turning');
    v.className='page';renderVerso();};
  flap.classList.add('go');book.classList.add('turning');
  after(280,()=>{v.className='page ceremony';
    v.innerHTML='<div class="vhead">Rung-up 昇格</div><div class="big">'+nxt.jp+'</div>'+
      '<div class="en">'+nxt.en+'</div><div id="houseSeal" hidden>黒沢<br>家</div>';});
  after(680,()=>{const seal=$('#houseSeal');if(seal){seal.hidden=false;seal.classList.add('stampin');}
    document.body.classList.add('thump');
    after(200,()=>document.body.classList.remove('thump'));});
  after(900,()=>{logged=true;log(copy,'milestone');});
  after(950,()=>{flap.classList.remove('go');book.classList.remove('turning');});
  S.rung++;S.meter=0;S.pagesTurned++;renderForeEdge();
  after(4300,()=>{$('#verso').className='page';renderVerso();busy=false;finishBeat=null;});}
function advanceSeason(judged){S.seasonIdx=(S.seasonIdx+1)%4;if(judged)S.day=1;
  document.body.dataset.season=SEASONS[S.seasonIdx];
  const cal=$('#cal');cal.style.opacity=.15;
  after(220,()=>{renderCalendar();cal.style.opacity=1;});}
function beatJudge(){if(busy)return;busy=true;
  const from=S.koku,to=from+3;S.koku=to;logAudit(from,to);
  const sb=$('#soroban');let seasoned=false;
  const season=()=>{if(seasoned)return;seasoned=true;advanceSeason(true);};
  finishBeat=()=>{sb.classList.remove('sweeping');renderSoroban(true);renderCalendar();season();
    while(slips.length)spearSlip(slips.shift());};
  /* day-end: the day's loose slips are speared onto the harigata, one by one */
  const nDay=slips.length;
  for(let i=0;i<nDay;i++)after(140+i*110,()=>{if(slips.length)spearSlip(slips.shift());});
  after(280,()=>{sb.classList.add('sweeping');for(const r of RODS)setRod(r.key,0);});
  after(820,()=>sb.classList.remove('sweeping'));
  after(1050,()=>{for(const r of RODS)setRod(r.key,S.res[r.key]);});
  after(1550,()=>{renderCalendar();season();busy=false;finishBeat=null;});}
function beatReveal(){
  if(!S.bestiOn){S.bestiOn=true;renderBesti();
    const b=$('#besti');b.classList.remove('placed');void b.offsetWidth;b.classList.add('placed');
    const f=FOES[0];S.besti.rat='seen';renderBesti();
    log('見聞帳 — '+f.jp+' '+f.en+': "'+f.blurb+'"','system');return;}
  const order=['wolf','mamushi','deepmap','boar','bandit'];
  const idx=Math.min(S.revealIdx,order.length);
  if(idx>=order.length){log(LINES.dream2,'dream');return;}
  S.revealIdx++;
  const what=order[idx];
  if(what==='deepmap'){S.deepFog=false;if(!S.known.includes('deep'))S.known.push('deep');
    renderMap();log(LINES.deepForage,'system');return;}
  const f=FOES.find(x=>x.id===what);S.besti[what]='seen';renderBesti();
  const b=$('#besti');b.classList.remove('placed');void b.offsetWidth;b.classList.add('placed');
  log('見聞帳 — '+f.jp+' '+f.en+': "'+f.blurb+'"','system');}
/* ---------- stages / dev ---------- */
function setStage(name){epoch++;finishBeat=null;const rep=$('#report');if(rep)rep.remove();busy=false;scriptIdx=0;
  S=makePreset(name);document.body.dataset.stage=S.stage;document.body.dataset.season=SEASONS[S.seasonIdx];
  clearSlips();$('#log').innerHTML='';
  S.seeds.forEach(([k,ch])=>log(LINES[k],ch==='le'?'':ch,true));
  renderAll(true);}
$('#key').addEventListener('click',()=>{if(S.pos!=='kura')return;$('#kura').classList.toggle('open');});
$$('#dev [data-dev]').forEach(b=>b.addEventListener('click',()=>{const a=b.dataset.dev;
  if(a!=='auto')forceResolve();
  if(a==='tick')tick();
  else if(a==='fight')beatFight();
  else if(a==='rung')beatRung();
  else if(a==='judge')beatJudge();
  else if(a==='reveal')beatReveal();
  else if(a==='season')advanceSeason(false);
  else if(a==='auto'){autoOn=!autoOn;b.dataset.on=autoOn;}
  else if(a==='reset')setStage('hour-three');
  else if(a==='stage-1min')setStage('minute-one');
  else if(a==='stage-3hr')setStage('hour-three');
  else if(a==='stage-10hr')setStage('hour-ten');}));
/* ---------- init ---------- */
buildStamps();buildRods();buildMap();buildBesti();
setStage('hour-three');
setTimeout(tick,700);
setInterval(()=>{if(autoOn)tick();},2500);
</script>
</body>
